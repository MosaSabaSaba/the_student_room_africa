<svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Background circle -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="1.5"/>

    <!-- Shaded Slices (3/8) -->
    <g fill="#00ffcc" stroke="#fff" stroke-width="0.5">
        <path d="M50,50 L50,5 A45,45 0 0,1 95,50 Z" />
        <path d="M50,50 L95,50 A45,45 0 0,1 81.8,81.8 Z" />
        <!-- <path d="M50,50 L81.8,81.8 A45,45 0 0,1 50,95 Z" /> -->
    </g>

    <!-- Grid Lines (The 8 parts) -->
    <g stroke="#ffffff" stroke-width="1" stroke-opacity="1">
        <line x1="50" y1="5" x2="50" y2="95"/>
        <line x1="5" y1="50" x2="95" y2="50"/>
        <line x1="18.2" y1="18.2" x2="81.8" y2="81.8"/>
        <line x1="18.2" y1="81.8" x2="81.8" y2="18.2"/>
    </g>
</svg>