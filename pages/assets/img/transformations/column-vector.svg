<svg style="font-family: 'Inter', system-ui, sans-serif;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
    <style>
        .math-text { font-family: "Times New Roman", Times, serif; font-size: 32px; font-style: italic; fill: #fff; text-anchor: middle; }
        .bracket { stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    </style>

    <!-- Left Bracket -->
    <path d="M 30,15 C 18,15 18,20 18,60 C 18,100 18,105 30,105" class="bracket" />

    <!-- Vector Elements -->
    <text x="50" y="48" class="math-text">x</text>
    <text x="50" y="88" class="math-text">y</text>

    <!-- Right Bracket -->
    <path d="M 70,15 C 82,15 82,20 82,60 C 82,100 82,105 70,105" class="bracket" />
</svg>