<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100%" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .mirror-line { stroke: #ffcc00; stroke-width: 2.5; stroke-dasharray: 8,4; }
        .object { fill: rgba(255, 255, 255, 0.15); stroke: #ffffff; stroke-width: 2; }
        .image { fill: rgba(0, 255, 204, 0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #ffffff; }
        .post-label { fill: #00ffcc; }
    </style>

    <defs>
        <marker id="axis-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Vertical Grid Lines (40px spacing, x = -10 to x = 10) -->
    <line x1="50" y1="50" x2="50" y2="690" class="grid-line" />
    <line x1="90" y1="50" x2="90" y2="690" class="grid-line" />
    <line x1="130" y1="50" x2="130" y2="690" class="grid-line" />
    <line x1="170" y1="50" x2="170" y2="690" class="grid-line" />
    <line x1="210" y1="50" x2="210" y2="690" class="grid-line" />
    <line x1="250" y1="50" x2="250" y2="690" class="grid-line" />
    <line x1="290" y1="50" x2="290" y2="690" class="grid-line" />
    <line x1="330" y1="50" x2="330" y2="690" class="grid-line" />
    <line x1="370" y1="50" x2="370" y2="690" class="grid-line" />
    <line x1="410" y1="50" x2="410" y2="690" class="grid-line" />
    <line x1="450" y1="50" x2="450" y2="690" class="axis-line" />
    <line x1="490" y1="50" x2="490" y2="690" class="grid-line" />
    <line x1="530" y1="50" x2="530" y2="690" class="grid-line" />
    <line x1="570" y1="50" x2="570" y2="690" class="grid-line" />
    <line x1="610" y1="50" x2="610" y2="690" class="grid-line" />
    <line x1="650" y1="50" x2="650" y2="690" class="grid-line" />
    <line x1="690" y1="50" x2="690" y2="690" class="grid-line" />
    <line x1="730" y1="50" x2="730" y2="690" class="grid-line" />
    <line x1="770" y1="50" x2="770" y2="690" class="grid-line" />
    <line x1="810" y1="50" x2="810" y2="690" class="grid-line" />
    <line x1="850" y1="50" x2="850" y2="690" class="grid-line" />

    <!-- Horizontal Grid Lines (40px spacing, y = -10 to y = 10) -->
    <line x1="50" y1="50" x2="850" y2="50" class="grid-line" />
    <line x1="50" y1="90" x2="850" y2="90" class="grid-line" />
    <line x1="50" y1="130" x2="850" y2="130" class="grid-line" />
    <line x1="50" y1="170" x2="850" y2="170" class="grid-line" />
    <line x1="50" y1="210" x2="850" y2="210" class="grid-line" />
    <line x1="50" y1="250" x2="850" y2="250" class="grid-line" />
    <line x1="50" y1="290" x2="850" y2="290" class="grid-line" />
    <line x1="50" y1="330" x2="850" y2="330" class="grid-line" />
    <line x1="50" y1="370" x2="850" y2="370" class="grid-line" />
    <line x1="50" y1="410" x2="850" y2="410" class="grid-line" />
    <line x1="50" y1="450" x2="850" y2="450" class="axis-line" />
    <line x1="50" y1="490" x2="850" y2="490" class="grid-line" />
    <line x1="50" y1="530" x2="850" y2="530" class="grid-line" />
    <line x1="50" y1="574" x2="850" y2="574" class="grid-line" />
    <line x1="50" y1="610" x2="850" y2="610" class="grid-line" />
    <line x1="50" y1="650" x2="850" y2="650" class="grid-line" />
    <line x1="50" y1="690" x2="850" y2="690" class="grid-line" />
    <line x1="50" y1="730" x2="850" y2="730" class="grid-line" />
    <line x1="50" y1="770" x2="850" y2="770" class="grid-line" />
    <line x1="50" y1="810" x2="850" y2="810" class="grid-line" />
    <line x1="50" y1="850" x2="850" y2="850" class="grid-line" />

    <!-- Axes -->
    <line x1="30" y1="450" x2="870" y2="450" class="axis-line" marker-end="url(#axis-arrow)" />
    <line x1="450" y1="870" x2="450" y2="30" class="axis-line" marker-end="url(#axis-arrow)" />

    <text x="880" y="455" class="axis-label">x</text>
    <text x="450" y="20" class="axis-label">y</text>

    <!-- Mirror line y = 2 -->
    <line x1="50" y1="370" x2="850" y2="370" class="mirror-line" />
    <text x="850" y="365" fill="#ffcc00" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">y = 2</text>

    <!-- X-Axis Numeric Markers -->
    <text x="50" y="468" class="axis-value">-10</text>
    <text x="90" y="468" class="axis-value">-9</text>
    <text x="130" y="468" class="axis-value">-8</text>
    <text x="170" y="468" class="axis-value">-7</text>
    <text x="210" y="468" class="axis-value">-6</text>
    <text x="250" y="468" class="axis-value">-5</text>
    <text x="290" y="468" class="axis-value">-4</text>
    <text x="330" y="468" class="axis-value">-3</text>
    <text x="370" y="468" class="axis-value">-2</text>
    <text x="410" y="468" class="axis-value">-1</text>
    <text x="438" y="468" class="axis-value">0</text>
    <text x="490" y="468" class="axis-value">1</text>
    <text x="530" y="468" class="axis-value">2</text>
    <text x="570" y="468" class="axis-value">3</text>
    <text x="610" y="468" class="axis-value">4</text>
    <text x="650" y="468" class="axis-value">5</text>
    <text x="690" y="468" class="axis-value">6</text>
    <text x="730" y="468" class="axis-value">7</text>
    <text x="770" y="468" class="axis-value">8</text>
    <text x="810" y="468" class="axis-value">9</text>
    <text x="850" y="468" class="axis-value">10</text>

    <!-- Y-Axis Numeric Markers -->
    <text x="432" y="54" class="axis-value">10</text>
    <text x="434" y="94" class="axis-value">9</text>
    <text x="434" y="134" class="axis-value">8</text>
    <text x="434" y="174" class="axis-value">7</text>
    <text x="434" y="214" class="axis-value">6</text>
    <text x="434" y="254" class="axis-value">5</text>
    <text x="434" y="294" class="axis-value">4</text>
    <text x="434" y="334" class="axis-value">3</text>
    <text x="434" y="374" class="axis-value">2</text>
    <text x="434" y="414" class="axis-value">1</text>
    <text x="431" y="494" class="axis-value">-1</text>
    <text x="431" y="534" class="axis-value">-2</text>
    <text x="431" y="574" class="axis-value">-3</text>
    <text x="431" y="614" class="axis-value">-4</text>
    <text x="431" y="654" class="axis-value">-5</text>
    <text x="431" y="694" class="axis-value">-6</text>
    <text x="431" y="734" class="axis-value">-7</text>
    <text x="431" y="774" class="axis-value">-8</text>
    <text x="431" y="814" class="axis-value">-9</text>
    <text x="428" y="854" class="axis-value">-10</text>

    <!-- Original Triangle (above mirror line y=2) -->
    <!-- A(3,4): x=450+40=570, y=450-160=290 -->
    <!-- B(5,4): x=450+80=650, y=450-160=290 -->
    <!-- C(4,6): x=450+40=610, y=450-240=210 -->
    <polygon points="570,290 650,290 610,210" class="object" />
    <circle cx="570" cy="290" r="4" fill="#ffffff" />
    <text x="575" y="305" class="point-label pre-label">A</text>
    <circle cx="650" cy="290" r="4" fill="#ffffff" />
    <text x="660" y="305" class="point-label pre-label">B</text>
    <circle cx="610" cy="210" r="4" fill="#ffffff" />
    <text x="620" y="200" class="point-label pre-label">C</text>

    <!-- Reflected Triangle (below mirror line y=2) -->
    <!-- A'(3,0): x=450+40=570, y=450+0=450 -->
    <!-- B'(5,0): x=450+80=650, y=450+0=450 -->
    <!-- C'(4,-2): x=450+40=610, y=450+80=530 -->
    <polygon points="570,450 650,450 610,530" class="image" />
    <circle cx="570" cy="450" r="4" fill="#00ffcc" />
    <text x="575" y="465" class="point-label post-label">A'</text>
    <circle cx="650" cy="450" r="4" fill="#00ffcc" />
    <text x="660" y="465" class="point-label post-label">B'</text>
    <circle cx="610" cy="530" r="4" fill="#00ffcc" />
    <text x="620" y="545" class="point-label post-label">C'</text>
</svg>