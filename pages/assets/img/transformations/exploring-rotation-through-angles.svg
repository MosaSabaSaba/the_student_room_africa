<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #ffffff; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .triangle-orig { fill: rgba(91, 163, 245, 0.18); stroke: #5ba3f5; stroke-width: 2; }
        .triangle-90 { fill: rgba(0, 255, 204, 0.12); stroke: #00ffcc; stroke-width: 2; stroke-dasharray: 7,3; }
        .triangle-180 { fill: rgba(255, 204, 68, 0.1); stroke: #ffcc00; stroke-width: 2; stroke-dasharray: 7,3; }
        .triangle-270 { fill: rgba(255, 136, 136, 0.12); stroke: #ff8888; stroke-width: 2; stroke-dasharray: 7,3; }
    </style>

    <defs>
        <marker id="ax2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
    </defs>

    <!-- Grid -->
    <g class="grid-line">
        <line x1="20" y1="60" x2="500" y2="60"/>
        <line x1="20" y1="100" x2="500" y2="100"/>
        <line x1="20" y1="140" x2="500" y2="140"/>
        <line x1="20" y1="180" x2="500" y2="180"/>
        <line x1="20" y1="220" x2="500" y2="220"/>
        <line x1="20" y1="260" x2="500" y2="260"/>
        <line x1="20" y1="300" x2="500" y2="300"/>
        <line x1="20" y1="340" x2="500" y2="340"/>
        <line x1="20" y1="380" x2="500" y2="380"/>
        <line x1="20" y1="420" x2="500" y2="420"/>
        <line x1="20" y1="460" x2="500" y2="460"/>

        <line x1="60" y1="20" x2="60" y2="500"/>
        <line x1="100" y1="20" x2="100" y2="500"/>
        <line x1="140" y1="20" x2="140" y2="500"/>
        <line x1="180" y1="20" x2="180" y2="500"/>
        <line x1="220" y1="20" x2="220" y2="500"/>
        <line x1="260" y1="20" x2="260" y2="500"/>
        <line x1="300" y1="20" x2="300" y2="500"/>
        <line x1="340" y1="20" x2="340" y2="500"/>
        <line x1="380" y1="20" x2="380" y2="500"/>
        <line x1="420" y1="20" x2="420" y2="500"/>
        <line x1="460" y1="20" x2="460" y2="500"/>
    </g>

    <!-- Axes -->
    <line x1="16" y1="260" x2="502" y2="260" class="axis-line" marker-end="url(#ax2)"/>
    <line x1="260" y1="500" x2="260" y2="14" class="axis-line" marker-end="url(#ax2)"/>

    <!-- Axis labels -->
    <text x="510" y="265" class="axis-label">x</text>
    <text x="260" y="10" class="axis-label" text-anchor="middle">y</text>

    <!-- Axis numeric markers -->
    <g class="axis-value">
        <text x="300" y="274">1</text>
        <text x="340" y="274">2</text>
        <text x="380" y="274">3</text>
        <text x="420" y="274">4</text>
        <text x="220" y="274">-1</text>
        <text x="180" y="274">-2</text>
        <text x="140" y="274">-3</text>
        <text x="100" y="274">-4</text>

        <text x="248" y="224">1</text>
        <text x="248" y="184">2</text>
        <text x="248" y="144">3</text>
        <text x="248" y="104">4</text>
        <text x="248" y="304">-1</text>
        <text x="248" y="344">-2</text>
        <text x="248" y="384">-3</text>
        <text x="248" y="424">-4</text>
    </g>

    <!-- Origin dot -->
    <circle cx="260" cy="260" r="5" fill="#ffcc00"/>
    <text x="268" y="256" fill="#ffcc00" font-size="11" font-weight="bold">(0,0)</text>

    <!-- Original PQR -->
    <polygon points="340,140 420,220 300,220" class="triangle-orig"/>
    <text x="344" y="132" fill="#5ba3f5" font-size="12" font-weight="600">P(2,3)</text>
    <text x="426" y="225" fill="#5ba3f5" font-size="12" font-weight="600">Q(4,1)</text>
    <text x="270" y="232" fill="#5ba3f5" font-size="12" font-weight="600">R(1,1)</text>

    <!-- 90° ACW -->
    <polygon points="140,180 220,100 220,220" class="triangle-90"/>
    <text x="80" y="176" fill="#00ffcc" font-size="12" font-weight="600">P′</text>
    <text x="224" y="98" fill="#00ffcc" font-size="12" font-weight="600">Q′</text>
    <text x="224" y="225" fill="#00ffcc" font-size="12" font-weight="600">R′</text>
    <text x="90" y="135" fill="#00ffcc" font-size="11">90° ACW</text>

    <!-- 180° -->
    <polygon points="180,380 100,300 220,300" class="triangle-180"/>
    <text x="182" y="395" fill="#ffcc00" font-size="12" font-weight="600">P′′</text>
    <text x="68" y="302" fill="#ffcc00" font-size="12" font-weight="600">Q′′</text>
    <text x="224" y="302" fill="#ffcc00" font-size="12" font-weight="600">R′′</text>
    <text x="96" y="395" fill="#ffcc00" font-size="11">180°</text>

    <!-- 270° ACW -->
    <polygon points="380,340 300,420 300,300" class="triangle-270"/>
    <text x="384" y="340" fill="#ff8888" font-size="12" font-weight="600">P′′′</text>
    <text x="304" y="432" fill="#ff8888" font-size="12" font-weight="600">Q′′′</text>
    <text x="304" y="298" fill="#ff8888" font-size="12" font-weight="600">R′′′</text>
    <text x="370" y="432" fill="#ff8888" font-size="11">270° ACW</text>
</svg>