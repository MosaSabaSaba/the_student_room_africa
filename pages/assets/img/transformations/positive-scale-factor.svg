<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100%" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .object { fill: rgba(255, 255, 255, 0.15); stroke: #ffffff; stroke-width: 2; }
        .image { fill: rgba(0, 255, 204, 0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .ray-line { stroke: #ff8888; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
        .centre-dot { fill: #ffcc00; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #ffffff; }
        .post-label { fill: #00ffcc; }
    </style>
    <defs>
        <marker id="axis-arrow-pos" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff" />
        </marker>
        <marker id="ray-arrow-pos" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff8888" />
        </marker>
    </defs>

    <!-- Grid lines (40px spacing) -->
    <line x1="50" y1="50" x2="50" y2="690" class="grid-line" />
    <line x1="90" y1="50" x2="90" y2="690" class="grid-line" />
    <line x1="130" y1="50" x2="130" y2="690" class="grid-line" />
    <line x1="170" y1="50" x2="170" y2="690" class="grid-line" />
    <line x1="210" y1="50" x2="210" y2="690" class="grid-line" />
    <line x1="250" y1="50" x2="250" y2="690" class="grid-line" />
    <line x1="290" y1="50" x2="290" y2="690" class="grid-line" />
    <line x1="330" y1="50" x2="330" y2="690" class="grid-line" />
    <line x1="370" y1="50" x2="370" y2="690" class="grid-line" />
    <line x1="410" y1="50" x2="410" y2="690" class="grid-line" />
    <line x1="450" y1="50" x2="450" y2="690" class="axis-line" />
    <line x1="490" y1="50" x2="490" y2="690" class="grid-line" />
    <line x1="530" y1="50" x2="530" y2="690" class="grid-line" />
    <line x1="570" y1="50" x2="570" y2="690" class="grid-line" />
    <line x1="610" y1="50" x2="610" y2="690" class="grid-line" />
    <line x1="650" y1="50" x2="650" y2="690" class="grid-line" />
    <line x1="690" y1="50" x2="690" y2="690" class="grid-line" />
    <line x1="730" y1="50" x2="730" y2="690" class="grid-line" />
    <line x1="770" y1="50" x2="770" y2="690" class="grid-line" />
    <line x1="810" y1="50" x2="810" y2="690" class="grid-line" />
    <line x1="850" y1="50" x2="850" y2="690" class="grid-line" />

    <line x1="50" y1="50" x2="850" y2="50" class="grid-line" />
    <line x1="50" y1="90" x2="850" y2="90" class="grid-line" />
    <line x1="50" y1="130" x2="850" y2="130" class="grid-line" />
    <line x1="50" y1="170" x2="850" y2="170" class="grid-line" />
    <line x1="50" y1="210" x2="850" y2="210" class="grid-line" />
    <line x1="50" y1="250" x2="850" y2="250" class="grid-line" />
    <line x1="50" y1="290" x2="850" y2="290" class="grid-line" />
    <line x1="50" y1="330" x2="850" y2="330" class="grid-line" />
    <line x1="50" y1="370" x2="850" y2="370" class="grid-line" />
    <line x1="50" y1="410" x2="850" y2="410" class="grid-line" />
    <line x1="50" y1="450" x2="850" y2="450" class="grid-line" />
    <line x1="50" y1="490" x2="850" y2="490" class="grid-line" />
    <line x1="50" y1="530" x2="850" y2="530" class="grid-line" />
    <line x1="50" y1="570" x2="850" y2="570" class="grid-line" />
    <line x1="50" y1="610" x2="850" y2="610" class="grid-line" />
    <line x1="50" y1="650" x2="850" y2="650" class="grid-line" />
    <line x1="50" y1="690" x2="850" y2="690" class="grid-line" />

    <!-- Axes: origin at (450,530), scale = 40px/unit -->
    <!-- px(x,y) = (450 + 40x, 530 - 40y) -->
    <line x1="30" y1="530" x2="870" y2="530" class="axis-line" marker-end="url(#axis-arrow-pos)" />
    <line x1="450" y1="690" x2="450" y2="30" class="axis-line" marker-end="url(#axis-arrow-pos)" />
    <text x="880" y="535" class="axis-label">x</text>
    <text x="450" y="20" class="axis-label">y</text>

    <!-- X-axis numbers -->
    <text x="450" y="548" class="axis-value">0</text>
    <text x="490" y="548" class="axis-value">1</text>
    <text x="530" y="548" class="axis-value">2</text>
    <text x="570" y="548" class="axis-value">3</text>
    <text x="610" y="548" class="axis-value">4</text>
    <text x="650" y="548" class="axis-value">5</text>
    <text x="690" y="548" class="axis-value">6</text>
    <text x="730" y="548" class="axis-value">7</text>
    <text x="770" y="548" class="axis-value">8</text>
    <text x="810" y="548" class="axis-value">9</text>
    <text x="410" y="548" class="axis-value">-1</text>

    <!-- Y-axis numbers -->
    <text x="434" y="494" class="axis-value">1</text>
    <text x="434" y="454" class="axis-value">2</text>
    <text x="434" y="414" class="axis-value">3</text>
    <text x="434" y="374" class="axis-value">4</text>
    <text x="434" y="334" class="axis-value">5</text>
    <text x="434" y="294" class="axis-value">6</text>
    <text x="434" y="254" class="axis-value">7</text>
    <text x="434" y="214" class="axis-value">8</text>
    <text x="434" y="174" class="axis-value">9</text>
    <text x="431" y="134" class="axis-value">10</text>

    <!-- Scale factor 3, centre O(0,0)=(450,530) -->
    <!-- Object: A(1,2)→(490,450)  B(3,2)→(570,450)  C(1,4)→(490,370) -->
    <!-- Image:  A'(3,6)→(570,290) B'(9,6)→(810,290) C'(3,12)→(570,50) -->

    <!-- Ray from O through A(490,450) to A'(570,290) extended -->
    <line x1="450" y1="530" x2="570" y2="290" class="ray-line" marker-end="url(#ray-arrow-pos)" />
    <!-- Ray from O through B(570,450) to B'(810,290) extended -->
    <line x1="450" y1="530" x2="810" y2="290" class="ray-line" marker-end="url(#ray-arrow-pos)" />
    <!-- Ray from O through C(490,370) to C'(570,50) extended -->
    <line x1="450" y1="530" x2="570" y2="50" class="ray-line" marker-end="url(#ray-arrow-pos)" />

    <!-- Object Triangle ABC -->
    <polygon points="490,450 570,450 490,370" class="object" />
    <circle cx="490" cy="450" r="4" fill="#ffffff" />
    <text x="477" y="468" class="point-label pre-label">A</text>
    <circle cx="570" cy="450" r="4" fill="#ffffff" />
    <text x="575" y="468" class="point-label pre-label">B</text>
    <circle cx="490" cy="370" r="4" fill="#ffffff" />
    <text x="475" y="365" class="point-label pre-label">C</text>

    <!-- Image Triangle A'B'C' -->
    <!-- A'(3,6)→(570,290) B'(9,6)→(810,290) C'(3,12)→(570,50) -->
    <polygon points="570,290 810,290 570,50" class="image" />
    <circle cx="570" cy="290" r="4" fill="#00ffcc" />
    <text x="555" y="285" class="point-label post-label">A'</text>
    <circle cx="810" cy="290" r="4" fill="#00ffcc" />
    <text x="815" y="285" class="point-label post-label">B'</text>
    <circle cx="570" cy="50" r="4" fill="#00ffcc" />
    <text x="575" y="48" class="point-label post-label">C'</text>

    <!-- Scale factor label -->
    <text x="180" y="360" fill="#ff8888" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">k = 3</text>
    <text x="180" y="380" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">centre O(0,0)</text>

    <!-- Centre -->
    <circle cx="450" cy="530" r="7" class="centre-dot" />
    <circle cx="450" cy="530" r="3" fill="#ffffff" />
    <text x="450" y="555" fill="#ffcc00" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">O(0,0)</text>
</svg>