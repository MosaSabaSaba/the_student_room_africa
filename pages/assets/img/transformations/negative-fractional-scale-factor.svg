<svg width="100%" height="100%" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .object { fill: rgba(255, 255, 255, 0.15); stroke: #ffffff; stroke-width: 2; }
        .image { fill: rgba(0, 255, 204, 0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .ray-line { stroke: #ff8888; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
        .centre-dot { fill: #ffcc00; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #ffffff; }
        .post-label { fill: #00ffcc; }
    </style>
    <defs>
        <marker id="axis-arrow-negfrac" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"></path>
        </marker>
        <marker id="ray-arrow-negfrac" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff8888"></path>
        </marker>
    </defs>

    <!-- Grid (50px spacing) -->
    <line x1="100" y1="50" x2="100" y2="690" class="grid-line"></line>
    <line x1="150" y1="50" x2="150" y2="690" class="grid-line"></line>
    <line x1="200" y1="50" x2="200" y2="690" class="grid-line"></line>
    <line x1="250" y1="50" x2="250" y2="690" class="grid-line"></line>
    <line x1="300" y1="50" x2="300" y2="690" class="grid-line"></line>
    <line x1="350" y1="50" x2="350" y2="690" class="grid-line"></line>
    <line x1="400" y1="50" x2="400" y2="690" class="grid-line"></line>
    <line x1="450" y1="50" x2="450" y2="690" class="axis-line"></line>
    <line x1="500" y1="50" x2="500" y2="690" class="grid-line"></line>
    <line x1="550" y1="50" x2="550" y2="690" class="grid-line"></line>
    <line x1="600" y1="50" x2="600" y2="690" class="grid-line"></line>
    <line x1="650" y1="50" x2="650" y2="690" class="grid-line"></line>
    <line x1="700" y1="50" x2="700" y2="690" class="grid-line"></line>
    <line x1="750" y1="50" x2="750" y2="690" class="grid-line"></line>
    <line x1="800" y1="50" x2="800" y2="690" class="grid-line"></line>
    <line x1="850" y1="50" x2="850" y2="690" class="grid-line"></line>

    <line x1="50" y1="60" x2="870" y2="60" class="grid-line"></line>
    <line x1="50" y1="110" x2="870" y2="110" class="grid-line"></line>
    <line x1="50" y1="160" x2="870" y2="160" class="grid-line"></line>
    <line x1="50" y1="210" x2="870" y2="210" class="grid-line"></line>
    <line x1="50" y1="260" x2="870" y2="260" class="grid-line"></line>
    <line x1="50" y1="310" x2="870" y2="310" class="grid-line"></line>
    <line x1="50" y1="360" x2="870" y2="360" class="grid-line"></line>
    <line x1="50" y1="410" x2="870" y2="410" class="axis-line"></line>
    <line x1="50" y1="460" x2="870" y2="460" class="grid-line"></line>
    <line x1="50" y1="510" x2="870" y2="510" class="grid-line"></line>
    <line x1="50" y1="560" x2="870" y2="560" class="grid-line"></line>
    <line x1="50" y1="610" x2="870" y2="610" class="grid-line"></line>
    <line x1="50" y1="660" x2="870" y2="660" class="grid-line"></line>

    <!-- Axes: origin at (450,410), scale=50px/unit -->
    <!-- px(x,y) = (450+50x, 410-50y) -->
    <line x1="30" y1="410" x2="875" y2="410" class="axis-line" marker-end="url(#axis-arrow-negfrac)"></line>
    <line x1="450" y1="690" x2="450" y2="30" class="axis-line" marker-end="url(#axis-arrow-negfrac)"></line>
    <text x="885" y="415" class="axis-label">x</text>
    <text x="450" y="20" class="axis-label">y</text>

    <!-- X-axis numbers (50px per unit) -->
    <text x="450" y="428" class="axis-value">0</text>
    <text x="500" y="428" class="axis-value">1</text>
    <text x="550" y="428" class="axis-value">2</text>
    <text x="600" y="428" class="axis-value">3</text>
    <text x="650" y="428" class="axis-value">4</text>
    <text x="700" y="428" class="axis-value">5</text>
    <text x="400" y="428" class="axis-value">-1</text>
    <text x="350" y="428" class="axis-value">-2</text>
    <text x="300" y="428" class="axis-value">-3</text>
    <text x="250" y="428" class="axis-value">-4</text>
    <text x="200" y="428" class="axis-value">-5</text>

    <!-- Y-axis numbers -->
    <text x="434" y="364" class="axis-value">1</text>
    <text x="434" y="314" class="axis-value">2</text>
    <text x="434" y="264" class="axis-value">3</text>
    <text x="434" y="214" class="axis-value">4</text>
    <text x="434" y="164" class="axis-value">5</text>
    <text x="434" y="114" class="axis-value">6</text>
    <text x="431" y="464" class="axis-value">-1</text>
    <text x="431" y="514" class="axis-value">-2</text>
    <text x="431" y="564" class="axis-value">-3</text>
    <text x="431" y="614" class="axis-value">-4</text>

    <!-- Computed pixels:                                    -->
    <!-- P(-4,2) = (450-200, 410-100) = (250, 310)           -->
    <!-- Q(2,2)  = (450+100, 410-100) = (550, 310)           -->
    <!-- R(-4,6) = (450-200, 410-300) = (250, 110)           -->
    <!-- P'(2,-1)= (450+100, 410+50)  = (550, 460)           -->
    <!-- Q'(-1,-1)=(450-50, 410+50)   = (400, 460)           -->
    <!-- R'(2,-3)= (450+100, 410+150) = (550, 560)           -->
    <!-- O(0,0)  = (450, 410)                                 -->

    <!-- Rays: each runs from object vertex, through O, to image vertex. -->
    <!-- The centre O sits BETWEEN object and image on every ray.        -->

    <!-- Ray through P(250,310) → O(450,410) → P'(550,460)             -->
    <!-- Extend slightly beyond P and beyond P' for clarity             -->
    <line x1="200" y1="285" x2="580" y2="477" class="ray-line" marker-end="url(#ray-arrow-negfrac)"></line>

    <!-- Ray through Q(550,310) → O(450,410) → Q'(400,460)             -->
    <line x1="575" y1="285" x2="374" y2="485" class="ray-line" marker-end="url(#ray-arrow-negfrac)"></line>

    <!-- Ray through R(250,110) → O(450,410) → R'(550,560)             -->
    <line x1="183" y1="11" x2="583" y2="608" class="ray-line" marker-end="url(#ray-arrow-negfrac)"></line>

    <!-- Object Triangle PQR (above x-axis, left of y-axis) -->
    <polygon points="250,310 550,310 250,110" class="object"></polygon>
    <circle cx="250" cy="310" r="4" fill="#ffffff"></circle>
    <text x="230" y="328" class="point-label pre-label">P</text>
    <circle cx="550" cy="310" r="4" fill="#ffffff"></circle>
    <text x="556" y="300" class="point-label pre-label">Q</text>
    <circle cx="250" cy="110" r="4" fill="#ffffff"></circle>
    <text x="230" y="106" class="point-label pre-label">R</text>

    <!-- Image Triangle P'Q'R' (below x-axis, right of y-axis) -->
    <!-- Inverted: compare to PQR orientation -->
    <polygon points="550,460 400,460 550,560" class="image"></polygon>
    <circle cx="550" cy="460" r="4" fill="#00ffcc"></circle>
    <text x="556" y="472" class="point-label post-label">P'</text>
    <circle cx="400" cy="460" r="4" fill="#00ffcc"></circle>
    <text x="374" y="472" class="point-label post-label">Q'</text>
    <circle cx="550" cy="560" r="4" fill="#00ffcc"></circle>
    <text x="556" y="574" class="point-label post-label">R'</text>

    <!-- Centre of enlargement O(0,0) → (450,410) -->
    <circle cx="450" cy="410" r="8" class="centre-dot"></circle>
    <circle cx="450" cy="410" r="3" fill="#ffffff"></circle>
    <text x="468" y="406" fill="#ffcc00" font-family="Arial, sans-serif" font-size="12" font-weight="bold">O(0,0)</text>

    <!-- Annotations -->
    <!-- Arrow from annotation box to centre (right side) -->
    <text x="730" y="230" fill="#ff8888" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">k = −½</text>
    <text x="730" y="250" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">centre O(0,0)</text>
    <text x="730" y="268" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">smaller + inverted</text>

    <!-- "between" callout label on centre -->
    <text x="628" y="390" fill="#ffcc00" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">O is between</text>
    <text x="628" y="404" fill="#ffcc00" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">object &amp; image</text>
    <line x1="590" y1="400" x2="462" y2="410" stroke="#ffcc00" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#ray-arrow-negfrac)"></line>
</svg>