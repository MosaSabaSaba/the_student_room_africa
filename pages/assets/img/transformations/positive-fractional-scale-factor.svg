<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100%" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .object { fill: rgba(255, 255, 255, 0.15); stroke: #ffffff; stroke-width: 2; }
        .image { fill: rgba(0, 255, 204, 0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .ray-line { stroke: #ff8888; stroke-width: 1.5; stroke-dasharray: 6,4; fill: none; }
        .centre-dot { fill: #ffcc00; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #ffffff; }
        .post-label { fill: #00ffcc; }
    </style>
    <defs>
        <marker id="axis-arrow-frac" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff" />
        </marker>
        <marker id="ray-arrow-frac" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ff8888" />
        </marker>
    </defs>

    <!-- Grid (60px spacing to match scale) -->
    <line x1="90" y1="50" x2="90" y2="640" class="grid-line" />
    <line x1="150" y1="50" x2="150" y2="640" class="grid-line" />
    <line x1="210" y1="50" x2="210" y2="640" class="grid-line" />
    <line x1="270" y1="50" x2="270" y2="640" class="grid-line" />
    <line x1="330" y1="50" x2="330" y2="640" class="grid-line" />
    <line x1="390" y1="50" x2="390" y2="640" class="grid-line" />
    <line x1="450" y1="50" x2="450" y2="640" class="axis-line" />
    <line x1="510" y1="50" x2="510" y2="640" class="grid-line" />
    <line x1="570" y1="50" x2="570" y2="640" class="grid-line" />
    <line x1="630" y1="50" x2="630" y2="640" class="grid-line" />
    <line x1="690" y1="50" x2="690" y2="640" class="grid-line" />
    <line x1="750" y1="50" x2="750" y2="640" class="grid-line" />
    <line x1="810" y1="50" x2="810" y2="640" class="grid-line" />

    <line x1="50" y1="90" x2="850" y2="90" class="grid-line" />
    <line x1="50" y1="150" x2="850" y2="150" class="grid-line" />
    <line x1="50" y1="210" x2="850" y2="210" class="grid-line" />
    <line x1="50" y1="270" x2="850" y2="270" class="grid-line" />
    <line x1="50" y1="330" x2="850" y2="330" class="grid-line" />
    <line x1="50" y1="390" x2="850" y2="390" class="grid-line" />
    <line x1="50" y1="450" x2="850" y2="450" class="axis-line" />
    <line x1="50" y1="510" x2="850" y2="510" class="grid-line" />
    <line x1="50" y1="570" x2="850" y2="570" class="grid-line" />
    <line x1="50" y1="630" x2="850" y2="630" class="grid-line" />

    <!-- Axes: origin (450,450), scale 60px/unit -->
    <line x1="30" y1="450" x2="870" y2="450" class="axis-line" marker-end="url(#axis-arrow-frac)" />
    <line x1="450" y1="640" x2="450" y2="30" class="axis-line" marker-end="url(#axis-arrow-frac)" />
    <text x="880" y="455" class="axis-label">x</text>
    <text x="450" y="20" class="axis-label">y</text>

    <!-- Axis labels (scale 60px = 1 unit) -->
    <text x="450" y="468" class="axis-value">0</text>
    <text x="510" y="468" class="axis-value">1</text>
    <text x="570" y="468" class="axis-value">2</text>
    <text x="630" y="468" class="axis-value">3</text>
    <text x="690" y="468" class="axis-value">4</text>
    <text x="750" y="468" class="axis-value">5</text>
    <text x="390" y="468" class="axis-value">-1</text>
    <text x="330" y="468" class="axis-value">-2</text>
    <text x="270" y="468" class="axis-value">-3</text>
    <text x="210" y="468" class="axis-value">-4</text>
    <text x="150" y="468" class="axis-value">-5</text>

    <text x="434" y="394" class="axis-value">1</text>
    <text x="434" y="334" class="axis-value">2</text>
    <text x="434" y="274" class="axis-value">3</text>
    <text x="434" y="214" class="axis-value">4</text>
    <text x="434" y="154" class="axis-value">5</text>
    <text x="434" y="94" class="axis-value">6</text>
    <text x="431" y="514" class="axis-value">-1</text>
    <text x="431" y="574" class="axis-value">-2</text>

    <!-- px(x,y) = (450+60x, 450-60y) -->
    <!-- Object: A(-2,2)→(330,330) B(4,2)→(690,330) C(-2,6)→(330,90) -->
    <!-- Image: A'(-1,1)→(390,390) B'(2,1)→(570,390) C'(-1,3)→(390,270) -->
    <!-- Centre O(0,0)→(450,450) -->

    <!-- Rays from O through image then object -->
    <line x1="450" y1="450" x2="280" y2="280" class="ray-line" marker-end="url(#ray-arrow-frac)" />
    <line x1="450" y1="450" x2="730" y2="310" class="ray-line" marker-end="url(#ray-arrow-frac)" />
    <line x1="450" y1="450" x2="320" y2="60" class="ray-line" marker-end="url(#ray-arrow-frac)" />

    <!-- Object Triangle ABC -->
    <polygon points="330,330 690,330 330,90" class="object" />
    <circle cx="330" cy="330" r="4" fill="#ffffff" />
    <text x="314" y="348" class="point-label pre-label">A</text>
    <circle cx="690" cy="330" r="4" fill="#ffffff" />
    <text x="695" y="348" class="point-label pre-label">B</text>
    <circle cx="330" cy="90" r="4" fill="#ffffff" />
    <text x="314" y="84" class="point-label pre-label">C</text>

    <!-- Image Triangle A'B'C' -->
    <polygon points="390,390 570,390 390,270" class="image" />
    <circle cx="390" cy="390" r="4" fill="#00ffcc" />
    <text x="374" y="408" class="point-label post-label">A'</text>
    <circle cx="570" cy="390" r="4" fill="#00ffcc" />
    <text x="574" y="408" class="point-label post-label">B'</text>
    <circle cx="390" cy="270" r="4" fill="#00ffcc" />
    <text x="374" y="264" class="point-label post-label">C'</text>

    <!-- Centre O(0,0) -->
    <circle cx="450" cy="450" r="8" class="centre-dot" />
    <circle cx="450" cy="450" r="3" fill="#ffffff" />
    <text x="450" y="476" fill="#ffcc00" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">O(0,0)</text>

    <!-- k label -->
    <text x="740" y="180" fill="#ff8888" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">k = ½</text>
    <text x="740" y="198" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">centre O(0,0)</text>
    <text x="740" y="216" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">image is smaller</text>
</svg>