<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100%" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .mirror-line { stroke: #ffcc00; stroke-width: 2.5; stroke-dasharray: 8,4; }
        .triangle { fill: rgba(255, 255, 255, 0.15); stroke: #ffffff; stroke-width: 2; }
        .triangle-image { fill: rgba(0, 255, 204, 0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #ffffff; }
        .post-label { fill: #00ffcc; }
    </style>

    <defs>
        <marker id="axis-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Vertical Grid Lines (40px spacing, x = -8 to x = 8) -->
    <line x1="50" y1="50" x2="50" y2="570" class="grid-line" />
    <line x1="90" y1="50" x2="90" y2="570" class="grid-line" />
    <line x1="130" y1="50" x2="130" y2="570" class="grid-line" />
    <line x1="170" y1="50" x2="170" y2="570" class="grid-line" />
    <line x1="210" y1="50" x2="210" y2="570" class="grid-line" />
    <line x1="250" y1="50" x2="250" y2="570" class="grid-line" />
    <line x1="290" y1="50" x2="290" y2="570" class="grid-line" />
    <line x1="330" y1="50" x2="330" y2="570" class="grid-line" />
    <line x1="370" y1="50" x2="370" y2="570" class="grid-line" />
    <line x1="410" y1="50" x2="410" y2="570" class="grid-line" />
    <line x1="490" y1="50" x2="490" y2="570" class="grid-line" />
    <line x1="530" y1="50" x2="530" y2="570" class="grid-line" />
    <line x1="570" y1="50" x2="570" y2="570" class="grid-line" />
    <line x1="610" y1="50" x2="610" y2="570" class="grid-line" />
    <line x1="650" y1="50" x2="650" y2="570" class="grid-line" />
    <line x1="690" y1="50" x2="690" y2="570" class="grid-line" />
    <line x1="730" y1="50" x2="730" y2="570" class="grid-line" />
    <line x1="770" y1="50" x2="770" y2="570" class="grid-line" />
    <line x1="810" y1="50" x2="810" y2="570" class="grid-line" />
    <line x1="850" y1="50" x2="850" y2="570" class="grid-line" />

    <!-- Horizontal Grid Lines (40px spacing, y = -6 to y = 8) -->
    <line x1="50" y1="50" x2="850" y2="50" class="grid-line" />
    <line x1="50" y1="90" x2="850" y2="90" class="grid-line" />
    <line x1="50" y1="130" x2="850" y2="130" class="grid-line" />
    <line x1="50" y1="170" x2="850" y2="170" class="grid-line" />
    <line x1="50" y1="210" x2="850" y2="210" class="grid-line" />
    <line x1="50" y1="250" x2="850" y2="250" class="grid-line" />
    <line x1="50" y1="290" x2="850" y2="290" class="grid-line" />
    <line x1="50" y1="330" x2="850" y2="330" class="grid-line" />
    <line x1="50" y1="370" x2="850" y2="370" class="grid-line" />
    <line x1="50" y1="410" x2="850" y2="410" class="grid-line" />
    <line x1="50" y1="490" x2="850" y2="490" class="grid-line" />
    <line x1="50" y1="530" x2="850" y2="530" class="grid-line" />
    <line x1="50" y1="570" x2="850" y2="570" class="grid-line" />

    <!-- Axes -->
    <line x1="30" y1="350" x2="870" y2="350" class="axis-line" marker-end="url(#axis-arrow)" />
    <line x1="450" y1="570" x2="450" y2="30" class="axis-line" marker-end="url(#axis-arrow)" />

    <text x="880" y="355" class="axis-label">x</text>
    <text x="450" y="20" class="axis-label">y</text>

    <!-- X-Axis Numeric Markers -->
    <text x="50" y="368" class="axis-value">-8</text>
    <text x="90" y="368" class="axis-value">-7</text>
    <text x="130" y="368" class="axis-value">-6</text>
    <text x="170" y="368" class="axis-value">-5</text>
    <text x="210" y="368" class="axis-value">-4</text>
    <text x="250" y="368" class="axis-value">-3</text>
    <text x="290" y="368" class="axis-value">-2</text>
    <text x="330" y="368" class="axis-value">-1</text>
    <text x="370" y="368" class="axis-value">0</text>
    <text x="410" y="368" class="axis-value">1</text>
    <text x="450" y="368" class="axis-value">2</text>
    <text x="490" y="368" class="axis-value">3</text>
    <text x="530" y="368" class="axis-value">4</text>
    <text x="570" y="368" class="axis-value">5</text>
    <text x="610" y="368" class="axis-value">6</text>
    <text x="650" y="368" class="axis-value">7</text>
    <text x="690" y="368" class="axis-value">8</text>
    <text x="730" y="368" class="axis-value">9</text>
    <text x="770" y="368" class="axis-value">10</text>
    <text x="810" y="368" class="axis-value">11</text>
    <text x="850" y="368" class="axis-value">12</text>

    <!-- Y-Axis Numeric Markers -->
    <text x="432" y="54" class="axis-value">8</text>
    <text x="432" y="94" class="axis-value">7</text>
    <text x="432" y="134" class="axis-value">6</text>
    <text x="432" y="174" class="axis-value">5</text>
    <text x="432" y="214" class="axis-value">4</text>
    <text x="432" y="254" class="axis-value">3</text>
    <text x="432" y="294" class="axis-value">2</text>
    <text x="432" y="334" class="axis-value">1</text>
    <text x="432" y="354" class="axis-value">0</text>
    <text x="432" y="374" class="axis-value">-1</text>
    <text x="432" y="414" class="axis-value">-2</text>
    <text x="432" y="454" class="axis-value">-3</text>
    <text x="432" y="494" class="axis-value">-4</text>
    <text x="432" y="534" class="axis-value">-5</text>
    <text x="432" y="574" class="axis-value">-6</text>

    <!-- Mirror line x = 2 -->
    <line x1="530" y1="50" x2="530" y2="570" class="mirror-line" />
    <text x="530" y="40" fill="#ffcc00" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">x = 2</text>

    <polygon points="610,250 690,250 650,170" class="triangle" />
    
    <!-- Vertex Labels (Object) -->
    <circle cx="610" cy="250" r="4" fill="#ffffff" />
    <text x="600" y="265" class="point-label pre-label">A</text>
    <circle cx="690" cy="250" r="4" fill="#ffffff" />
    <text x="695" y="265" class="point-label pre-label">B</text>
    <circle cx="650" cy="170" r="4" fill="#ffffff" />
    <text x="655" y="160" class="point-label pre-label">C</text>

    <polygon points="450,250 370,250 410,170" class="triangle-image" />
    
    <!-- Vertex Labels (Image) -->
    <circle cx="450" cy="250" r="4" fill="#00ffcc" />
    <text x="440" y="265" class="point-label post-label">A'</text>
    <circle cx="370" cy="250" r="4" fill="#00ffcc" />
    <text x="355" y="265" class="point-label post-label">B'</text>
    <circle cx="410" cy="170" r="4" fill="#00ffcc" />
    <text x="395" y="160" class="point-label post-label">C'</text>
</svg>