<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" viewBox="0 0 520 440" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #ffffff; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .centre { fill: #ffcc00; }
        .triangle { fill: rgba(91, 163, 245, 0.15); stroke: #5ba3f5; stroke-width: 2; }
        .triangle-image { fill: rgba(0, 255, 204, 0.12); stroke: #00ffcc; stroke-width: 2; stroke-dasharray: 6,3; }
        .point-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .pre-label { fill: #5ba3f5; }
        .post-label { fill: #00ffcc; }
        .arc { stroke: #ff8888; stroke-width: 1.5; stroke-dasharray: 5,4; fill: none; }
    </style>

    <defs>
        <marker id="ax" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
    </defs>

    <!-- Grid -->
    <g class="grid-line">
        <line x1="30" y1="60" x2="490" y2="60"/>
        <line x1="30" y1="100" x2="490" y2="100"/>
        <line x1="30" y1="140" x2="490" y2="140"/>
        <line x1="30" y1="180" x2="490" y2="180"/>
        <line x1="30" y1="220" x2="490" y2="220"/>
        <line x1="30" y1="260" x2="490" y2="260"/>
        <line x1="30" y1="300" x2="490" y2="300"/>
        <line x1="30" y1="340" x2="490" y2="340"/>
        <line x1="30" y1="380" x2="490" y2="380"/>
        
        <line x1="70" y1="20" x2="70" y2="420"/>
        <line x1="110" y1="20" x2="110" y2="420"/>
        <line x1="150" y1="20" x2="150" y2="420"/>
        <line x1="190" y1="20" x2="190" y2="420"/>
        <line x1="230" y1="20" x2="230" y2="420"/>
        <line x1="270" y1="20" x2="270" y2="420"/>
        <line x1="310" y1="20" x2="310" y2="420"/>
        <line x1="350" y1="20" x2="350" y2="420"/>
        <line x1="390" y1="20" x2="390" y2="420"/>
        <line x1="430" y1="20" x2="430" y2="420"/>
        <line x1="470" y1="20" x2="470" y2="420"/>
    </g>

    <!-- Axes -->
    <line x1="20" y1="300" x2="495" y2="300" class="axis-line" marker-end="url(#ax)"/>
    <line x1="150" y1="420" x2="150" y2="16" class="axis-line" marker-end="url(#ax)"/>

    <text x="500" y="304" class="axis-label">x</text>
    <text x="150" y="12" class="axis-label" text-anchor="middle">y</text>

    <!-- Axis numeric markers -->
    <g class="axis-value">
        <text x="110" y="315">-1</text>
        <text x="70" y="315">-2</text>
        <text x="190" y="315">1</text>
        <text x="230" y="315">2</text>
        <text x="270" y="315">3</text>
        <text x="310" y="315">4</text>
        <text x="350" y="315">5</text>
        <text x="390" y="315">6</text>
        <text x="138" y="265">1</text>
        <text x="138" y="225">2</text>
        <text x="138" y="185">3</text>
        <text x="138" y="145">4</text>
        <text x="138" y="105">5</text>
        <text x="138" y="345">-1</text>
        <text x="138" y="385">-2</text>
    </g>

    <!-- Original triangle ABC -->
    <polygon points="230,140 310,140 270,260" class="triangle"/>
    <circle cx="230" cy="140" r="4" fill="#5ba3f5"/>
    <text x="220" y="132" class="point-label pre-label">A</text>
    <circle cx="310" cy="140" r="4" fill="#5ba3f5"/>
    <text x="318" y="132" class="point-label pre-label">B</text>

    <!-- Image triangle A'B'C' -->
    <polygon points="150,300 150,220 270,260" class="triangle-image"/>
    <circle cx="150" cy="300" r="4" fill="#00ffcc"/>
    <text x="156" y="314" class="point-label post-label">A′</text>
    <circle cx="150" cy="220" r="4" fill="#00ffcc"/>
    <text x="156" y="217" class="point-label post-label">B′</text>

    <!-- Centre C (fixed) -->
    <circle cx="270" cy="260" r="6" class="centre"/>
    <text x="278" y="256" fill="#ffcc00" font-size="13" font-weight="600">C = C′</text>

    <!-- Rotation arc -->
    <path d="M230,140 A90,90 0 0,0 150,300" class="arc"/>
    <text x="175" y="180" fill="#ff8888" font-size="11">90° ACW</text>
</svg>