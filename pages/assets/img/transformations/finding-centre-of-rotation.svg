<svg style="font-family: 'Inter', system-ui, sans-serif;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <style>
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
        .axis-value { fill: #ffffff; font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
        .bisector-red { stroke: #ff8888; stroke-width: 2.5; stroke-dasharray: 6,4; }
        .bisector-green { stroke: #88ff88; stroke-width: 2.5; stroke-dasharray: 6,4; }
        .segment-red { stroke: #ff8888; stroke-width: 2; }
        .segment-green { stroke: #88ff88; stroke-width: 2; }
        .vertex-dot { fill: #ffffff; }
        .vertex-label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
        .center-dot { fill: #ffcc00; }
        .center-label { fill: #ffcc00; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
        .callout-line { stroke: #ffcc00; stroke-width: 2.5; fill: none; }
    </style>

    <defs>
        <!-- Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line"/>
        </pattern>
        
        <!-- Arrowhead Marker for Axes -->
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
        
        <!-- Yellow Arrowhead for Annotation -->
        <marker id="yellow-arrow" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffcc00"/>
        </marker>
    </defs>

    <!-- Background Grid -->
    <rect width="500" height="500" fill="url(#grid)"/>

    <!-- Coordinate Axes (Origin at 240, 240) -->
    <!-- X-Axis -->
    <line x1="10" y1="240" x2="490" y2="240" class="axis-line" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <!-- Y-Axis -->
    <line x1="240" y1="490" x2="240" y2="10" class="axis-line" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

    <!-- Axis Labels -->
    <g class="axis-label">
        <text x="40" y="255" text-anchor="middle">-5</text>
        <text x="80" y="255" text-anchor="middle">-4</text>
        <text x="120" y="255" text-anchor="middle">-3</text>
        <text x="160" y="255" text-anchor="middle">-2</text>
        <text x="200" y="255" text-anchor="middle">-1</text>
        <text x="280" y="255" text-anchor="middle">1</text>
        <text x="320" y="255" text-anchor="middle">2</text>
        <text x="360" y="255" text-anchor="middle">3</text>
        <text x="400" y="255" text-anchor="middle">4</text>
        <text x="440" y="255" text-anchor="middle">5</text>
    </g>

    <!-- Y-Axis Numeric Markers -->
    <g class="axis-value">
        <text x="252" y="44" vertical-align="middle">5</text>
        <text x="252" y="84" vertical-align="middle">4</text>
        <text x="252" y="124" vertical-align="middle">3</text>
        <text x="252" y="164" vertical-align="middle">2</text>
        <text x="252" y="204" vertical-align="middle">1</text>
        <text x="252" y="284" vertical-align="middle">-1</text>
        <text x="252" y="324" vertical-align="middle">-2</text>
        <text x="252" y="364" vertical-align="middle">-3</text>
        <text x="252" y="404" vertical-align="middle">-4</text>
        <text x="252" y="444" vertical-align="middle">-5</text>
    </g>

    <!-- Left Triangle (Object) - Vertices: (-3,0), (-3,3), (-5,3) -->
    <polygon points="120,240 120,120 40,120" fill="rgba(91, 163, 245, 0.18)" stroke="#5ba3f5" stroke-width="2"/>

    <!-- Right Triangle (Image) - Vertices: (1,2), (4,2), (4,4) -->
    <polygon points="280,160 400,160 400,80" fill="rgba(91, 163, 245, 0.18)" stroke="#5ba3f5" stroke-width="2"/>

    <!-- Segment AA' connecting (-3,0) and (1,2) -->
    <line x1="120" y1="240" x2="280" y2="160" class="segment-red"/>

    <!-- Segment BB' connecting (-3,3) and (4,2) -->
    <line x1="120" y1="120" x2="400" y2="160" class="segment-green"/>

    <!-- Perpendicular Bisectors intersecting at (0, -1) -->
    <!-- Bisector 1 (Red dashed line) -->
    <line x1="110" y1="20" x2="330" y2="460" class="bisector-red"/>

    <!-- Bisector 2 (Green dashed line) -->
    <line x1="277.14" y1="20" x2="214.29" y2="460" class="bisector-green"/>

    <!-- Vertex Dots -->
    <circle cx="120" cy="240" r="4" class="vertex-dot"/>
    <circle cx="280" cy="160" r="4" class="vertex-dot"/>
    <circle cx="120" cy="120" r="4" class="vertex-dot"/>
    <circle cx="400" cy="160" r="4" class="vertex-dot"/>

    <!-- Vertex Labels -->
    <g class="vertex-label">
        <text x="105" y="255">A</text>
        <text x="285" y="150">A'</text>
        <text x="128" y="135">B</text>
        <text x="385" y="180">B'</text>
    </g>

    <!-- Center of Rotation Dot (0, -1) -->
    <circle cx="240" cy="280" r="7" class="center-dot"/>
    <circle cx="240" cy="280" r="3" fill="#ffffff"/>

    <!-- Label Callout -->
    <g class="center-label">
        <text x="110" y="325" text-anchor="middle">center</text>
        <text x="110" y="345" text-anchor="middle">of rotation</text>
        <path d="M 155,320 225,292" class="callout-line" marker-end="url(#yellow-arrow)"/>
    </g>
</svg>