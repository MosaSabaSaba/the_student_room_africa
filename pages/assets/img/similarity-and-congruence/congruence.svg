<svg style="font-family: 'Inter', system-ui, sans-serif;" width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape { fill: rgba(255,255,255,0.12); stroke: #ffffff; stroke-width: 2; }
        .shape-cong { fill: rgba(0,255,204,0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .label-cong { fill: #00ffcc; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
    </style>
    <!-- Triangle ABC -->
    <polygon points="60,160 130,50 200,160" class="shape"/>
    <text x="55" y="175" class="label">A</text>
    <text x="125" y="45" class="label">B</text>
    <text x="205" y="175" class="label">C</text>
    
    <!-- Triangle DEF (congruent, translated) -->
    <polygon points="280,160 350,50 420,160" class="shape-cong"/>
    <text x="275" y="175" class="label-cong">D</text>
    <text x="345" y="45" class="label-cong">E</text>
    <text x="425" y="175" class="label-cong">F</text>
    
    <text x="240" y="105" fill="#ff8888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">≅</text>
    <text x="240" y="130" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Congruent</text>
</svg>