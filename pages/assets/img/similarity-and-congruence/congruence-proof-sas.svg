<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="230" viewBox="0 0 550 230" xmlns="http://www.w3.org/2000/svg">
    <style>
        .triangle1 { fill: rgba(255,255,255,0.12); stroke: #ffffff; stroke-width: 2; }
        .triangle2 { fill: rgba(0,255,204,0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .label1 { fill: #ffffff; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .label2 { fill: #00ffcc; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .side-label { fill: #ff8888; font-family: Arial, sans-serif; font-size: 11px; }
        .angle-label { fill: #ffcc44; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
    
    <!-- Triangle ABC -->
    <polygon points="60,160 130,50 200,160" class="triangle1"/>
    <text x="55" y="175" class="label1">A</text>
    <text x="125" y="42" class="label1">B</text>
    <text x="205" y="175" class="label1">C</text>
    
    <!-- Side AB = 5 cm -->
    <line x1="60" y1="160" x2="130" y2="50" class="equal-mark"/>
    <text x="85" y="100" class="side-label">5 cm</text>
    
    <!-- Side AC = 7 cm -->
    <line x1="60" y1="160" x2="200" y2="160" class="equal-mark" stroke-dasharray="4,2"/>
    <text x="115" y="185" class="side-label">7 cm</text>
    
    <!-- Angle A = 45° -->
    <path d="M 70,155 L 78,148" stroke="#ffcc44" stroke-width="1.5" fill="none"/>
    <text x="88" y="142" class="angle-label">45°</text>
    
    <!-- Triangle DEF (congruent) -->
    <polygon points="320,160 390,50 460,160" class="triangle2"/>
    <text x="315" y="175" class="label2">D</text>
    <text x="385" y="42" class="label2">E</text>
    <text x="465" y="175" class="label2">F</text>
    
    <!-- Side DE = 5 cm -->
    <line x1="320" y1="160" x2="390" y2="50" class="equal-mark"/>
    <text x="345" y="100" class="side-label">5 cm</text>
    
    <!-- Side DF = 7 cm -->
    <line x1="320" y1="160" x2="460" y2="160" class="equal-mark" stroke-dasharray="4,2"/>
    <text x="375" y="185" class="side-label">7 cm</text>
    
    <!-- Angle D = 45° -->
    <path d="M 330,155 L 338,148" stroke="#ffcc44" stroke-width="1.5" fill="none"/>
    <text x="348" y="142" class="angle-label">45°</text>
    
    <!-- Congruence symbol -->
    <text x="270" y="110" fill="#00ffcc" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">≅</text>
    
    <!-- Side BC and EF are implied equal (but not marked) -->
    <text x="270" y="135" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">BC = EF (implied)</text>
</svg>