<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100" viewBox="0 0 240 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Triangle 1 (Small) -->
    <polygon points="30,80 80,80 30,30" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Right Angle Box T1 -->
    <path d="M 30,72 L 38,72 L 38,80" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <!-- T1 Proportions -->
    <text x="62" y="52" fill="#ff8888" font-size="12" font-weight="bold" text-anchor="middle">H</text>
    <text x="18" y="58" fill="#5ba3f5" font-size="12" font-weight="bold" text-anchor="middle">S</text>

    <!-- Triangle 2 (Large Scale 1.4x) -->
    <polygon points="140,80 210,80 140,10" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Right Angle Box T2 -->
    <path d="M 140,72 L 148,72 L 148,80" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <!-- T2 Proportions -->
    <text x="185" y="42" fill="#ff8888" font-size="12" font-weight="bold" text-anchor="middle">kH</text>
    <text x="125" y="48" fill="#5ba3f5" font-size="12" font-weight="bold" text-anchor="middle">kS</text>
</svg>