<svg style="font-family: 'Inter', system-ui, sans-serif;" width="100%" height="100" viewBox="0 0 240 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Triangle 1 (Small) -->
    <polygon points="20,80 80,80 35,25" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Included Angle T1 -->
    <path d="M 35,80 A 15,15 0 0,1 26,67" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <!-- T1 Side Labels -->
    <text x="50" y="93" fill="#ff8888" font-size="12" font-weight="bold" text-anchor="middle">x</text>
    <text x="18" y="50" fill="#5ba3f5" font-size="12" font-weight="bold" text-anchor="middle">y</text>

    <!-- Triangle 2 (Large Scale 1.4x) -->
    <polygon points="135,80 219,80 156,3" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Included Angle T2 -->
    <path d="M 150,80 A 15,15 0 0,1 141,67" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <!-- T2 Side Labels -->
    <text x="177" y="93" fill="#ff8888" font-size="12" font-weight="bold" text-anchor="middle">3x</text>
    <text x="133" y="38" fill="#5ba3f5" font-size="12" font-weight="bold" text-anchor="middle">3y</text>
</svg>