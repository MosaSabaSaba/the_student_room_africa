<svg style="font-family: 'Inter', system-ui, sans-serif;" width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape-sim1 { fill: rgba(255,255,255,0.12); stroke: #ffffff; stroke-width: 2; }
        .shape-sim2 { fill: rgba(0,255,204,0.15); stroke: #00ffcc; stroke-width: 2.5; }
        .label-sim1 { fill: #ffffff; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
        .label-sim2 { fill: #00ffcc; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
    </style>
    <!-- Small triangle -->
    <polygon points="80,150 130,70 180,150" class="shape-sim1"/>
    <text x="75" y="165" class="label-sim1">A</text>
    <text x="125" y="65" class="label-sim1">B</text>
    <text x="185" y="165" class="label-sim1">C</text>
    
    <!-- Large similar triangle (scale factor 2) -->
    <polygon points="280,150 380,30 480,150" class="shape-sim2"/>
    <text x="275" y="165" class="label-sim2">D</text>
    <text x="375" y="25" class="label-sim2">E</text>
    <text x="485" y="165" class="label-sim2">F</text>
    
    <text x="240" y="105" fill="#ff8888" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">∼</text>
    <text x="240" y="130" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Similar (scale factor 2)</text>
</svg>