<svg style="font-family: 'Inter', system-ui, sans-serif;" width="270" height="250" viewBox="0 0 270 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .st   { stroke: #ffffff; stroke-width: 1.8; fill: rgba(0,255,204,0.12); }
        .sy   { stroke: #ffcc00; stroke-width: 1.8; fill: rgba(255,204,0,0.15); }
        .dk   { stroke: #ffffff; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
        .dky  { stroke: #ffcc00; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
        .dl   { stroke: #ffcc00; stroke-width: 1.3; fill: none; stroke-dasharray: 4,3; }
        .dm   { fill: #ffcc00; font-family: sans-serif; font-size: 11px; font-weight: bold; }
    </style>

    <g transform="translate(10,30)">
        <text x="110" y="0" fill="#00ffcc" font-family="sans-serif" font-size="13px" font-weight="bold" text-anchor="middle">House Diagram</text>
        
        <!-- Cube structure -->
        <rect x="20" y="110" width="100" height="80" class="st"/>
        <path d="M20,110 L44,88 L144,88 L120,110 Z" class="dk"/>
        <path d="M120,110 L144,88 L144,168 L120,190 Z" class="st"/>
        <line x1="44" y1="88"  x2="44"  y2="168" class="dk"/>
        <line x1="44" y1="168" x2="144" y2="168" class="dk"/>
        <line x1="44" y1="168" x2="20"  y2="190" class="dk"/>
        
        <!-- Roof structure -->
        <path d="M20,110 L70,62 L120,110 Z" class="sy"/>
        <line x1="44" y1="88" x2="94"  y2="40" class="dky"/>
        <line x1="94" y1="40" x2="144" y2="88" class="dky"/>
        <path d="M20,110 L70,62 L94,40 L44,88 Z" class="sy"/>
        <path d="M120,110 L70,62 L94,40 L144,88 Z" class="sy"/>

        <!-- Dimensions -->
        <line x1="8"  y1="110" x2="8"   y2="190" class="dl"/>
        <text x="2" y="154" class="dm" text-anchor="end">8 m (h)</text>
        
        <line x1="20" y1="202" x2="120" y2="202" class="dl"/>
        <text x="70" y="215" class="dm" text-anchor="middle">10 m (l)</text>
        
        <line x1="125" y1="112" x2="148" y2="92" class="dl" stroke-dasharray="none"/>
        <text x="142" y="112" class="dm">10 m (b)</text>
        
        <line x1="70" y1="62" x2="70" y2="110" class="dl" stroke="#ffcc00"/>
        <text x="74" y="90" class="dm">5 m</text>
    </g>
</svg>