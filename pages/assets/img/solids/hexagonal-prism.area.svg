<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="420" viewBox="0 0 550 420" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(60, 40)">
        <path d="M 20,20 L 60,20 L 80,45 L 60,70 L 20,70 L 0,45 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,45 L 0,145 M 20,70 L 20,170 M 60,70 L 60,170 M 80,45 L 80,145" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,145 L 20,170 L 60,170 L 80,145" fill="none" stroke="#ffffff" stroke-width="2"/>
        
        <circle cx="40" cy="45" r="3" fill="#00ffcc"/>
        <line x1="40" y1="45" x2="40" y2="70" stroke="#00ffcc" stroke-width="2"/>
        <text x="45" y="62" fill="#00ffcc" font-size="12" font-weight="bold">a=3.5m</text>
        
        <text x="30" y="190" fill="#ffffff" font-size="12">s = 4m</text>
        <text x="90" y="100" fill="#ffffff" font-size="12">L = 12m</text>
    </g>

    <rect x="260" y="10" width="280" height="380" fill="none" stroke="#00ffcc" stroke-width="2"/>
    
    <!-- STEP 1: Perimeter -->
    <text x="270" y="40" fill="#00ffcc" font-weight="bold" font-size="16">STEP 1: Perimeter of Base</text>
    <text x="270" y="65" fill="#ffffff" font-size="14">Perim = 6 sides × 4m</text>
    <text x="270" y="85" fill="#00ffcc" font-size="14">Perim = 24m</text>

    <!-- STEP 2: Base Area -->
    <text x="270" y="130" fill="#00ffcc" font-weight="bold" font-size="16">STEP 2: Area of 2 Bases</text>
    <text x="270" y="155" fill="#ffffff" font-size="14">Area = ½ × Perim × apothem</text>
    <text x="270" y="175" fill="#ffffff" font-size="14">Area = ½ × (24) × 3.5 = 42m²</text>
    <text x="270" y="195" fill="#00ffcc" font-size="14">Total Bases = 42 × 2 = 84m²</text>

    <!-- STEP 3 -->
    <text x="270" y="240" fill="#00ffcc" font-weight="bold" font-size="16">STEP 3: Area of Sides</text>
    <text x="270" y="265" fill="#ffffff" font-size="14">Side Area = Perim × Length</text>
    <text x="270" y="285" fill="#00ffcc" font-size="14">Side Area = 24 × 12 = 288m²</text>

    <!-- STEP 4 -->
    <text x="270" y="330" fill="#00ffcc" font-weight="bold" font-size="16">STEP 4: Total Surface Area</text>
    <text x="270" y="355" fill="#ffffff" font-size="14">TSA = 84 + 288</text>
    <text x="270" y="375" fill="#00ffcc" font-weight="bold" font-size="18">TSA = 372m²</text>
</svg>