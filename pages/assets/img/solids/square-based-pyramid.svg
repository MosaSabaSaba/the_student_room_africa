<svg style="font-family: 'Inter', system-ui, sans-serif;" width="520" height="480" viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D SHAPE -->
    <path d="M 80,180 L 220,180 L 280,130" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,180 L 180,40 L 220,180 M 180,40 L 280,130" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,180 L 140,130 L 280,130 M 140,130 L 180,40" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,5"/>
    
    <!-- Characteristics in #00ffcc -->
    <circle cx="180" cy="40" r="6" fill="#00ffcc"/>
    <text x="195" y="45" fill="#00ffcc" font-weight="bold" font-size="18">Apex</text>
    <line x1="80" y1="180" x2="220" y2="180" stroke="#00ffcc" stroke-width="5"/>
    <text x="110" y="210" fill="#00ffcc" font-weight="bold" font-size="18">Base Edge</text>
    <text x="210" y="110" fill="#00ffcc" font-weight="bold" font-size="18">Face</text>

    <!-- Totals -->
    <rect x="350" y="40" width="160" height="110" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="360" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Faces: 5</text>
    <text x="360" y="100" fill="#00ffcc" font-weight="bold" font-size="18">Edges: 8</text>
    <text x="360" y="130" fill="#00ffcc" font-weight="bold" font-size="18">Vertices: 5</text>

    <!-- THE NET -->
    <g transform="translate(180, 280)">
        <text x="0" y="10" fill="#ffffff" font-size="16" font-style="italic">Unfolded Net</text>
        <rect x="40" y="60" width="60" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 40,60 L 70,20 L 100,60 M 100,60 L 140,90 L 100,120 M 100,120 L 70,160 L 40,120 M 40,120 L 0,90 L 40,60" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
</svg>