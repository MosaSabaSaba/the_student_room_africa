<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="550" viewBox="0 0 550 550" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D SHAPE -->
    <path d="M 80,180 L 120,210 L 180,210 L 220,180 L 180,150 L 120,150 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="80" y1="180" x2="80" y2="80" stroke="#ffffff" stroke-width="3"/>
    <line x1="120" y1="210" x2="120" y2="110" stroke="#ffffff" stroke-width="3"/>
    <line x1="180" y1="210" x2="180" y2="110" stroke="#ffffff" stroke-width="3"/>
    <line x1="220" y1="180" x2="220" y2="80" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,80 L 120,110 L 180,110 L 220,80 L 180,50 L 120,50 Z" fill="none" stroke="#ffffff" stroke-width="3"/>

    <!-- Characteristics in #00ffcc -->
    <circle cx="220" cy="80" r="6" fill="#00ffcc"/>
    <text x="235" y="80" fill="#00ffcc" font-weight="bold" font-size="18">Vertex</text>
    <line x1="180" y1="210" x2="220" y2="180" stroke="#00ffcc" stroke-width="5"/>
    <text x="210" y="210" fill="#00ffcc" font-weight="bold" font-size="18">Edge</text>
    <text x="135" y="185" fill="#00ffcc" font-weight="bold" font-size="18">Face</text>

    <!-- Totals -->
    <rect x="350" y="40" width="160" height="110" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="360" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Faces: 8</text>
    <text x="360" y="100" fill="#00ffcc" font-weight="bold" font-size="18">Edges: 18</text>
    <text x="360" y="130" fill="#00ffcc" font-weight="bold" font-size="18">Vertices: 12</text>

    <!-- THE NET -->
    <g transform="translate(50, 300)">
        <text x="120" y="10" fill="#ffffff" font-size="16" font-style="italic">Unfolded Net</text>
        <!-- 6 Rectangles -->
        <rect x="0" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="40" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="80" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="120" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="160" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="200" y="60" width="40" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <!-- Top Hexagon Flap -->
        <path d="M 80,60 L 60,40 L 80,20 L 120,20 L 140,40 L 120,60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <!-- Bottom Hexagon Flap -->
        <path d="M 80,140 L 60,160 L 80,180 L 120,180 L 140,160 L 120,140" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
</svg>