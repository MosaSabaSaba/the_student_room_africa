<svg style="font-family: 'Inter', system-ui, sans-serif;" width="400" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .st   { stroke: #ffffff; stroke-width: 1.8; fill: rgba(0,255,204,0.12); }
        .sy   { stroke: #ffcc00; stroke-width: 1.8; fill: rgba(255,204,0,0.15); }
        .dl   { stroke: #ffcc00; stroke-width: 1.3; fill: none; stroke-dasharray: 4,3; }
        .dm   { fill: #ffcc00; font-family: sans-serif; font-size: 11px; font-weight: bold; }
    </style>

    <g transform="translate(25,30)">
        <text x="125" y="0" fill="#ffffff" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Water Tank Diagram</text>
        
        <!-- Cylinder -->
        <rect x="75" y="60" width="100" height="110" fill="rgba(0,255,204,0.12)"/>
        <line x1="75" y1="60" x2="75" y2="170" stroke="#ffffff" stroke-width="1.8"/>
        <line x1="175" y1="60" x2="175" y2="170" stroke="#ffffff" stroke-width="1.8"/>
        <ellipse cx="125" cy="60" rx="50" ry="15" fill="rgba(0,255,204,0.12)" stroke="#ffffff" stroke-width="1.8"/>
        
        <!-- Hemisphere Bottom -->
        <path d="M75,170 A50,40 0 0 0 175,170" fill="rgba(255,204,0,0.15)" stroke="#ffcc00" stroke-width="1.8"/>

        <!-- Dimensions -->
        <line x1="125" y1="60" x2="175" y2="60" class="dl" stroke-dasharray="none"/>
        <text x="150" y="52" class="dm" text-anchor="middle">r = 2m</text>
        <line x1="185" y1="60" x2="185" y2="170" class="dl"/>
        <text x="190" y="118" class="dm">h = 5m</text>
    </g>
</svg>