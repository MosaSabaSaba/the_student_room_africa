<svg style="font-family: 'Inter', system-ui, sans-serif;"  width="350" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .st   { stroke: #ffffff; stroke-width: 1.8; fill: rgba(0,255,204,0.12); }
        .sy   { stroke: #ffcc00; stroke-width: 1.8; fill: rgba(255,204,0,0.15); }
        .dk   { stroke: #ffffff; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
        .dky  { stroke: #ffcc00; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
        .dl   { stroke: #ffcc00; stroke-width: 1.3; fill: none; stroke-dasharray: 4,3; }
        .dm   { fill: #ffcc00; font-family: sans-serif; font-size: 11px; font-weight: bold; }
    </style>

    <g transform="translate(25,30)">
        
        <!-- Cylinder structure -->
        <line x1="60" y1="80" x2="190" y2="80" stroke="#ffffff" stroke-width="1.8"/>
        <line x1="60" y1="140" x2="190" y2="140" stroke="#ffffff" stroke-width="1.8"/>
        <rect x="60" y="80" width="130" height="60" fill="rgba(0,255,204,0.12)" stroke="none"/>
        
        <!-- Internal join lines -->
        <line x1="60"  y1="80" x2="60"  y2="140" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="4,3"/>
        <line x1="190" y1="80" x2="190" y2="140" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="4,3"/>

        <!-- Hemisphere ends -->
        <path d="M60,80 A30,30 0 0 0 60,140" fill="rgba(255,204,0,0.15)" stroke="#ffcc00" stroke-width="1.8"/>
        <path d="M60,80 A10,30 0 0 1 60,140" class="dky"/>
        <path d="M190,80 A30,30 0 0 1 190,140" fill="rgba(255,204,0,0.15)" stroke="#ffcc00" stroke-width="1.8"/>
        <path d="M190,80 A10,30 0 0 0 190,140" class="dky"/>

        <!-- Dimensions -->
        <line x1="60" y1="110" x2="30" y2="110" class="dl" stroke-dasharray="none"/>
        <text x="25" y="114" class="dm" text-anchor="end">r = 3 m</text>

        <line x1="60" y1="155" x2="190" y2="155" class="dl"/>
        <text x="125" y="170" class="dm" text-anchor="middle">length = 9 m</text>

        <line x1="205" y1="80" x2="205" y2="140" class="dl"/>
        <text x="212" y="114" class="dm">d = 6 m</text>
    </g>
</svg>