<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="500" viewBox="0 0 550 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D Prism with Units -->
    <g transform="translate(50, 20)">
        <path d="M 0,120 L 80,120 L 0,40 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,120 L 100,70 M 80,120 L 180,70 M 0,40 L 100,-10" stroke="#ffffff" stroke-width="2"/>
        <path d="M 100,70 L 180,70 L 100,-10 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
        <text x="30" y="135" fill="#00ffcc" font-size="14">3cm</text>
        <text x="-40" y="85" fill="#00ffcc" font-size="14">4cm</text>
        <text x="120" y="105" fill="#00ffcc" font-size="14">10cm (Length)</text>
        <text x="35" y="70" fill="#00ffcc" font-size="14" transform="rotate(-45, 35, 70)">5cm</text>
    </g>

    <!-- Net with Units -->
    <g transform="translate(50, 230)">
        <rect x="0" y="40" width="40" height="120" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="40" y="40" width="30" height="120" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="70" y="40" width="50" height="120" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 40,40 L 40,0 L 70,40 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 40,160 L 40,200 L 70,160 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        <text x="-35" y="105" fill="#00ffcc" font-size="14">10cm</text>
        <text x="10" y="180" fill="#00ffcc" font-size="12">4cm</text>
        <text x="45" y="180" fill="#00ffcc" font-size="12">3cm</text>
        <text x="85" y="180" fill="#00ffcc" font-size="12">5cm</text>
    </g>

    <!-- Calculation Steps -->
    <rect x="260" y="20" width="270" height="230" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="270" y="50" fill="#00ffcc" font-weight="bold" font-size="16">1. Generic Formula:</text>
    <text x="270" y="75" fill="#ffffff" font-size="14">Area = 2(Triangle) + 3(Rectangles)</text>
    
    <text x="270" y="110" fill="#00ffcc" font-weight="bold" font-size="16">2. Plug in Numbers:</text>
    <text x="270" y="135" fill="#ffffff" font-size="14">Triangles: 2 × (0.5 × 3 × 4) = 12</text>
    <text x="270" y="160" fill="#ffffff" font-size="14">Rect 1: 4 × 10 = 40</text>
    <text x="270" y="180" fill="#ffffff" font-size="14">Rect 2: 3 × 10 = 30</text>
    <text x="270" y="200" fill="#ffffff" font-size="14">Rect 3: 5 × 10 = 50</text>
    
    <text x="270" y="235" fill="#00ffcc" font-weight="bold" font-size="18">Total = 132cm²</text>
</svg>