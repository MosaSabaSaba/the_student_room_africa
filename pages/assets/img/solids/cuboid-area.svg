<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="500" viewBox="0 0 550 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D Cuboid with Units -->
    <g transform="translate(50, 40)">
        <rect x="0" y="40" width="100" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,40 L 40,0 L 140,0 L 140,60 L 100,100" fill="none" stroke="#ffffff" stroke-width="2"/>
        <line x1="100" y1="40" x2="140" y2="0" stroke="#ffffff" stroke-width="2"/>
        <text x="40" y="120" fill="#00ffcc" font-size="14">8m (L)</text>
        <text x="125" y="90" fill="#00ffcc" font-size="14">5m (W)</text>
        <text x="-30" y="75" fill="#00ffcc" font-size="14">3m (H)</text>
    </g>

    <!-- Net with Units -->
    <g transform="translate(30, 240)">
        <rect x="40" y="30" width="80" height="40" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Top -->
        <rect x="40" y="70" width="80" height="50" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Front -->
        <rect x="40" y="120" width="80" height="40" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Bottom -->
        <rect x="40" y="160" width="80" height="50" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Back -->
        <rect x="0" y="70" width="40" height="50" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Side -->
        <rect x="120" y="70" width="40" height="50" fill="none" stroke="#ffffff" stroke-width="2"/> <!-- Side -->
        <text x="75" y="25" fill="#00ffcc" font-size="12">8m</text>
        <text x="165" y="95" fill="#00ffcc" font-size="12">5m</text>
        <text x="125" y="60" fill="#00ffcc" font-size="12">3m</text>
    </g>

    <!-- Calculation Steps -->
    <rect x="260" y="20" width="270" height="200" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="270" y="50" fill="#00ffcc" font-weight="bold" font-size="16">1. Generic Formula:</text>
    <text x="270" y="75" fill="#ffffff" font-size="14">TSA = 2(lw + lh + wh)</text>
    
    <text x="270" y="110" fill="#00ffcc" font-weight="bold" font-size="16">2. Plug in Numbers:</text>
    <text x="270" y="135" fill="#ffffff" font-size="14">lw: 8 × 5 = 40</text>
    <text x="270" y="155" fill="#ffffff" font-size="14">lh: 8 × 3 = 24</text>
    <text x="270" y="175" fill="#ffffff" font-size="14">wh: 5 × 3 = 15</text>
    
    <text x="270" y="205" fill="#00ffcc" font-weight="bold" font-size="18">Total: 2(40+24+15) = 158m²</text>
</svg>