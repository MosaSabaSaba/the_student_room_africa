<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="500" viewBox="0 0 550 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D SHAPE -->
    <ellipse cx="180" cy="60" rx="100" ry="35" fill="none" stroke="#ffffff" stroke-width="3" />
    <path d="M 80,60 L 80,200 A 100,35 0 0 0 280,200 L 280,60" fill="none" stroke="#ffffff" stroke-width="3" />
    <path d="M 80,200 A 100,35 0 0 1 280,200" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,5" />

    <!-- Characteristics in #00ffcc -->
    <line x1="280" y1="60" x2="280" y2="200" stroke="#00ffcc" stroke-width="5"/>
    <text x="290" y="140" fill="#00ffcc" font-weight="bold" font-size="18">Height</text>
    <text x="135" y="140" fill="#00ffcc" font-weight="bold" font-size="18">Curved Face</text>

    <!-- Totals -->
    <rect x="350" y="40" width="160" height="110" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="360" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Faces: 3</text>
    <text x="360" y="100" fill="#00ffcc" font-weight="bold" font-size="18">Edges: 2</text>
    <text x="360" y="130" fill="#00ffcc" font-weight="bold" font-size="18">Vertices: 0</text>

    <!-- THE NET -->
    <g transform="translate(150, 280)">
        <text x="20" y="10" fill="#ffffff" font-size="16" font-style="italic">Unfolded Net</text>
        <circle cx="80" cy="40" r="30" fill="none" stroke="#ffffff" stroke-width="2" />
        <rect x="10" y="70" width="140" height="70" fill="none" stroke="#ffffff" stroke-width="2" />
        <circle cx="80" cy="170" r="30" fill="none" stroke="#ffffff" stroke-width="2" />
    </g>
</svg>