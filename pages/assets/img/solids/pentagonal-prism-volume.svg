<svg style="font-family: 'Inter', system-ui, sans-serif;" width="250" height="250" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
    <!-- Pentagonal Prism Diagram -->
    <g transform="translate(60, 40)">
        <path d="M 30,60 L 90,60 L 110,30 L 60,0 L 10,30 Z" fill="rgba(0, 255, 204, 0.1)" stroke="#ffffff" stroke-width="2"/>
        <path d="M 30,60 L 30,140 M 90,60 L 90,140 M 110,30 L 110,110 M 60,0 L 60,80 M 10,30 L 10,110" stroke="#ffffff" stroke-width="2"/>
        <path d="M 30,140 L 90,140 L 110,110" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 110,110 L 60,80 L 10,110 L 30,140" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
        
        <!-- Shape Labels -->
        <text x="60" y="160" fill="#00ffcc" font-size="12" text-anchor="middle">p = 30cm</text>
        <text x="115" y="75" fill="#00ffcc" font-size="12">a = 4cm</text>
        <text x="115" y="115" fill="#00ffcc" font-size="12">h = 10cm</text>
    </g>

</svg>