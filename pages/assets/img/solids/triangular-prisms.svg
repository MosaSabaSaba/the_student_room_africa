<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="500" viewBox="0 0 550 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D SHAPE -->
    <path d="M 80,180 L 200,180 L 140,80 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,180 L 160,130 M 200,180 L 280,130 M 140,80 L 220,30" stroke="#ffffff" stroke-width="3"/>
    <path d="M 160,130 L 280,130 L 220,30 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,5"/>

    <!-- Characteristics in #00ffcc -->
    <circle cx="140" cy="80" r="6" fill="#00ffcc"/>
    <text x="10" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Vertex</text>
    <line x1="80" y1="180" x2="200" y2="180" stroke="#00ffcc" stroke-width="5"/>
    <text x="100" y="210" fill="#00ffcc" font-weight="bold" font-size="18">Edge</text>
    <text x="180" y="110" fill="#00ffcc" font-weight="bold" font-size="18">Face</text>

    <!-- Totals -->
    <rect x="350" y="40" width="160" height="110" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="360" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Faces: 5</text>
    <text x="360" y="100" fill="#00ffcc" font-weight="bold" font-size="18">Edges: 9</text>
    <text x="360" y="130" fill="#00ffcc" font-weight="bold" font-size="18">Vertices: 6</text>

    <!-- THE NET -->
    <g transform="translate(100, 280)">
        <text x="50" y="-10" fill="#ffffff" font-size="16" font-style="italic">Unfolded Net</text>
        <rect x="0" y="40" width="50" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="50" y="40" width="50" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="100" y="40" width="50" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 50,40 L 75,0 L 100,40 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 50,120 L 75,160 L 100,120 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
</svg>