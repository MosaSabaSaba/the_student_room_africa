<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="500" viewBox="0 0 550 500" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D SHAPE -->
    <rect x="80" y="100" width="140" height="80" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,100 L 140,40 L 280,40 L 280,120 L 220,180" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="220" y1="100" x2="280" y2="40" stroke="#ffffff" stroke-width="3"/>
    <path d="M 80,180 L 140,120 L 140,40 M 140,120 L 280,120" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8,5"/>

    <!-- Characteristics in #00ffcc -->
    <circle cx="280" cy="40" r="6" fill="#00ffcc"/>
    <text x="290" y="35" fill="#00ffcc" font-weight="bold" font-size="18">Vertex</text>
    <line x1="220" y1="180" x2="280" y2="120" stroke="#00ffcc" stroke-width="5"/>
    <text x="255" y="170" fill="#00ffcc" font-weight="bold" font-size="18">Edge</text>
    <text x="145" y="145" fill="#00ffcc" font-weight="bold" font-size="18">Face</text>

    <!-- Totals -->
    <rect x="350" y="40" width="160" height="110" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="360" y="70" fill="#00ffcc" font-weight="bold" font-size="18">Faces: 6</text>
    <text x="360" y="100" fill="#00ffcc" font-weight="bold" font-size="18">Edges: 12</text>
    <text x="360" y="130" fill="#00ffcc" font-weight="bold" font-size="18">Vertices: 8</text>

    <!-- THE NET -->
    <g transform="translate(100, 250)">
        <text x="60" y="10" fill="#ffffff" font-size="16" font-style="italic">Unfolded Net</text>
        <rect x="0" y="60" width="40" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="40" y="60" width="70" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="110" y="60" width="40" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="150" y="60" width="70" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="40" y="20" width="70" height="40" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="40" y="120" width="70" height="40" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
</svg>