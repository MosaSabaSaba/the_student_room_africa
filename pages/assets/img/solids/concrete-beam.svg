<svg  style="font-family: 'Inter', system-ui, sans-serif;" width="400" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .st   { stroke: #ffffff; stroke-width: 1.8; fill: rgba(0,255,204,0.12); }
        .sy   { stroke: #ffcc00; stroke-width: 1.8; fill: rgba(255,204,0,0.15); }
        .dm   { fill: #ffcc00; font-family: sans-serif; font-size: 11px; font-weight: bold; }
    </style>

    <g transform="translate(20,40)">
        <text x="120" y="-10" fill="#ffffff" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Concrete Beam Diagram</text>
        
        <!-- Cuboid Base -->
        <rect x="20" y="120" width="140" height="50" class="st"/>
        <path d="M160,120 L185,100 L185,150 L160,170 Z" class="st"/>
        <path d="M20,120 L45,100 L185,100 L160,120 Z" class="st"/>

        <!-- Triangular Prism Top -->
        <path d="M20,120 L90,65 L160,120 Z" class="sy"/>
        <path d="M90,65 L115,45 L185,100 L160,120 Z" class="sy"/>

        <!-- Dimensions -->
        <text x="90" y="185" class="dm" text-anchor="middle">8m (length)</text>
        <text x="10" y="150" class="dm" text-anchor="end">2m (h)</text>
        <text x="180" y="115" class="dm">2m (w)</text>
        <text x="110" y="80" class="dm" fill="#ffcc00">prism height = 2m</text>
    </g>
</svg>