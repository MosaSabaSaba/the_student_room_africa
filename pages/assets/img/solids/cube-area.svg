<svg style="font-family: 'Inter', system-ui, sans-serif;" width="550" height="400" viewBox="0 0 550 400" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D Cube with Units -->
    <g transform="translate(80, 40)">
        <!-- Front Face -->
        <rect x="0" y="40" width="80" height="80" fill="none" stroke="#ffffff" stroke-width="2"/>
        <!-- Top and Right Sides -->
        <path d="M 0,40 L 30,10 L 110,10 L 110,90 L 80,120" fill="none" stroke="#ffffff" stroke-width="2"/>
        <!-- Connector Line -->
        <line x1="80" y1="40" x2="110" y2="10" stroke="#ffffff" stroke-width="2"/>
        
        <!-- Units -->
        <text x="30" y="140" fill="#00ffcc" font-weight="bold" font-size="16">4cm (s)</text>
        <text x="115" y="55" fill="#00ffcc" font-weight="bold" font-size="16">4cm</text>
        <text x="-45" y="85" fill="#00ffcc" font-weight="bold" font-size="16">4cm</text>
    </g>

    <!-- Net with Units -->
    <g transform="translate(50, 240)">
        <rect x="50" y="0" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="0" y="50" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="50" y="50" width="50" height="50" fill="none" stroke="#00ffcc" stroke-width="3" fill-opacity="0.1"/>
        <rect x="100" y="50" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="150" y="50" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
        <rect x="50" y="100" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
        
        <text x="60" y="80" fill="#00ffcc" font-size="12">4cm</text>
        <text x="25" y="45" fill="#ffffff" font-size="14" font-style="italic">6 Equal Faces</text>
    </g>

    <!-- Calculation Steps -->
    <rect x="280" y="20" width="250" height="180" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <text x="290" y="50" fill="#00ffcc" font-weight="bold" font-size="16">1. Generic Formula:</text>
    <text x="290" y="75" fill="#ffffff" font-size="14">TSA = 6 × (side × side)</text>
    <text x="290" y="95" fill="#ffffff" font-size="14">TSA = 6s²</text>
    
    <text x="290" y="130" fill="#00ffcc" font-weight="bold" font-size="16">2. Plug in Numbers:</text>
    <text x="290" y="155" fill="#ffffff" font-size="14">One Face: 4 × 4 = 16cm²</text>
    
    <text x="290" y="185" fill="#00ffcc" font-weight="bold" font-size="18">Total: 6 × 16 = 96cm²</text>
</svg>