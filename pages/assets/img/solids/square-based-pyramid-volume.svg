<svg style="font-family: 'Inter', system-ui, sans-serif;" width="250" height="230" viewBox="0 0 250 230" xmlns="http://www.w3.org/2000/svg">
    <!-- 3D Pyramid -->
    <g transform="translate(50, 20)">
        <path d="M 0,150 L 120,150 L 160,110" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,150 L 80,20 L 120,150 M 80,20 L 160,110" fill="none" stroke="#ffffff" stroke-width="2"/>
        <path d="M 0,150 L 40,110 L 160,110 M 40,110 L 80,20" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
        
        <!-- Height dimension -->
        <line x1="80" y1="20" x2="80" y2="150" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,2"/>
        <text x="85" y="90" fill="#ffcc00" font-size="14">h = 10cm</text>
        <text x="45" y="165" fill="#00ffcc" font-size="14">s = 6cm</text>
    </g>

</svg>