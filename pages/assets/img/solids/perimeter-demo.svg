<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 450 370" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="background-color: transparent;">
    <style>
        .shape { stroke: #fff; stroke-width: 3; fill: none; }
        .txt { fill: #fff; font-family: sans-serif; font-size: 16px; }
        .side-label { fill: #00ffcc; font-family: sans-serif; font-size: 18px; font-weight: bold; }
    </style>

    <g transform="translate(50, 50)">
        
        <!-- Regular Hexagon -->
        <path d="M 150 50 L 236 100 L 236 200 L 150 250 L 64 200 L 64 100 Z" class="shape" />
        
        <!-- Side Labels (s) -->
        <text x="185" y="70" class="side-label">s</text>
        <text x="245" y="155" class="side-label">s</text>
        <text x="185" y="240" class="side-label">s</text>
        <text x="100" y="240" class="side-label">s</text>
        <text x="45" y="155" class="side-label">s</text>
        <text x="100" y="70" class="side-label">s</text>

        
    </g>
</svg>