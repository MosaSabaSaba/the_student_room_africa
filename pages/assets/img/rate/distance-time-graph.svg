<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 550 400" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis-line { stroke: #ffffff; stroke-width: 2; }
        .axis-label { fill: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
        .journey-line { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .segment-constant { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .segment-stationary { stroke: #ff8888; stroke-width: 3; fill: none; }
        .segment-return { stroke: #ffcc00; stroke-width: 3; fill: none; }
        .grid-line { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.3; }
    </style>

    <rect x="60" y="20" width="470" height="340" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="20" x2="60" y2="360" class="axis-line"/>
    <line x1="60" y1="360" x2="530" y2="360" class="axis-line"/>

    <!-- Grid lines -->
    <line x1="157" y1="20" x2="157" y2="360" class="grid-line"/>
    <line x1="254" y1="20" x2="254" y2="360" class="grid-line"/>
    <line x1="351" y1="20" x2="351" y2="360" class="grid-line"/>
    <line x1="448" y1="20" x2="448" y2="360" class="grid-line"/>
    
    <line x1="60" y1="288" x2="530" y2="288" class="grid-line"/>
    <line x1="60" y1="216" x2="530" y2="216" class="grid-line"/>
    <line x1="60" y1="144" x2="530" y2="144" class="grid-line"/>
    <line x1="60" y1="72" x2="530" y2="72" class="grid-line"/>

    <!-- Labels -->
    <text x="60" y="380" class="axis-label" text-anchor="middle">0</text>
    <text x="157" y="380" class="axis-label" text-anchor="middle">1</text>
    <text x="254" y="380" class="axis-label" text-anchor="middle">2</text>
    <text x="351" y="380" class="axis-label" text-anchor="middle">3</text>
    <text x="448" y="380" class="axis-label" text-anchor="middle">4</text>

    <text x="50" y="360" class="axis-label" text-anchor="end">0</text>
    <text x="50" y="288" class="axis-label" text-anchor="end">20</text>
    <text x="50" y="216" class="axis-label" text-anchor="end">40</text>
    <text x="50" y="144" class="axis-label" text-anchor="end">60</text>
    <text x="50" y="72" class="axis-label" text-anchor="end">80</text>

    <text x="295" y="400" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Time (hours)</text>
    <text x="20" y="200" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90, 20, 200)">Distance (km)</text>

    <!-- Journey segments -->
    <!-- Segment 1: 0 to 1 hour, 0 to 40 km (speed 40 km/h) -->
    <polyline points="60,360 157,216" class="segment-constant"/>
    <!-- Segment 2: 1 to 2 hours, stationary at 40 km -->
    <polyline points="157,216 254,216" class="segment-stationary"/>
    <!-- Segment 3: 2 to 3 hours, 40 to 80 km (speed 40 km/h) -->
    <polyline points="254,216 351,72" class="segment-constant"/>
    <!-- Segment 4: 3 to 4 hours, 80 to 0 km (return, speed 80 km/h) -->
    <polyline points="351,72 448,360" class="segment-return"/>

    <!-- Legend -->
    <rect x="350" y="30" width="180" height="70" fill="none" stroke="#00ffcc" stroke-width="1"/>
    <line x1="360" y1="45" x2="390" y2="45" style="stroke:#00ffcc; stroke-width:3"/>
    <text x="400" y="49" class="axis-label">Moving</text>
    <line x1="360" y1="65" x2="390" y2="65" style="stroke:#ff8888; stroke-width:3"/>
    <text x="400" y="69" class="axis-label">Stationary</text>
    <line x1="360" y1="85" x2="390" y2="85" style="stroke:#ffcc00; stroke-width:3"/>
    <text x="400" y="89" class="axis-label">Returning</text>
</svg>