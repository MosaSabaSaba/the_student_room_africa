<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 230" width="300" height="230" style="display: inline-block; font-family: 'Inter', system-ui, sans-serif;">
    <!-- Hidden Back Edges (Dashed) -->
    <line x1="40" y1="160" x2="150" y2="110" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" fill="none" /> <!-- D to A -->
    <line x1="150" y1="110" x2="260" y2="160" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" fill="none" /> <!-- A to B -->
    
    <!-- Base Center & Internal Right Triangle Construction (Dashed) -->
    <line x1="150" y1="30" x2="150" y2="155" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" fill="none" /> <!-- Height VM -->
    <line x1="150" y1="155" x2="260" y2="160" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" fill="none" /> <!-- Half Diagonal MB -->
    <line x1="40" y1="160" x2="260" y2="160" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" fill="none" /> <!-- Full Base Diagonal DB -->
    
    <!-- Right Angle Indicator at Base Center -->
    <path d="M 158,155 L 158,150 L 150,150" stroke="#ffffff" stroke-width="1" fill="none" />

    <!-- Visible Front Base Edges -->
    <line x1="40" y1="160" x2="150" y2="200" stroke="#ffffff" stroke-width="2" fill="none" /> <!-- D to C -->
    <line x1="150" y1="200" x2="260" y2="160" stroke="#ffffff" stroke-width="2" fill="none" /> <!-- C to B -->

    <!-- Visible Slant Edges -->
    <line x1="150" y1="30" x2="40" y2="160" stroke="#ffffff" stroke-width="2" fill="none" />  <!-- V to D -->
    <line x1="150" y1="30" x2="150" y2="200" stroke="#ffffff" stroke-width="2" fill="none" /> <!-- V to C -->
    <line x1="150" y1="30" x2="260" y2="160" stroke="#ffffff" stroke-width="2" fill="none" /> <!-- V to B -->

    <!-- Dimension Labels -->
    <text x="85" y="190" font-family="Times New Roman, serif" font-size="13" fill="#ffffff">10 cm</text>
    <text x="210" y="190" font-family="Times New Roman, serif" font-size="13" fill="#ffffff">10 cm</text>
    <text x="215" y="95" font-family="Times New Roman, serif" font-size="13" fill="#ffffff">13 cm</text>
    <text x="136" y="100" font-family="Times New Roman, serif" font-style="italic" font-size="14" fill="#ffffff">h</text>

    <!-- Vertex Identifiers -->
    <text x="150" y="22" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">V</text>
    <text x="155" y="106" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
    <text x="268" y="164" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">B</text>
    <text x="150" y="214" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
    <text x="28" y="164" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">D</text>
    <text x="138" y="164" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">M</text>
</svg>