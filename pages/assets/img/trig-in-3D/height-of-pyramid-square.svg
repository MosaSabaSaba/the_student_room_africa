<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 160" width="180" height="140" style="display: inline-block; font-family: 'Inter', system-ui, sans-serif;">
    <!-- Base Square Outlines -->
    <rect x="20" y="20" width="120" height="120" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Diagonal BD Line -->
    <line x1="20" y1="140" x2="140" y2="20" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
    
    <!-- Right Angle Square at C -->
    <path d="M 140,130 L 130,130 L 130,140" stroke="#ffffff" stroke-width="1" fill="none" />
    
    <!-- Midpoint Core Vector -->
    <circle cx="80" cy="80" r="2.5" fill="#ffffff" />

    <!-- Labels -->
    <text x="10" y="25" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">A</text>
    <text x="145" y="25" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">B</text>
    <text x="145" y="145" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>
    <text x="10" y="145" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">D</text>
    <text x="86" y="76" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">M</text>
    
    <text x="80" y="152" font-family="Times New Roman, serif" font-size="12" fill="#ffffff" text-anchor="middle">10 cm</text>
    <text x="154" y="85" font-family="Times New Roman, serif" font-size="12" fill="#ffffff">10 cm</text>
</svg>