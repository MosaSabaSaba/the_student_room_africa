<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 110" width="220" height="110" style="display: inline-block; font-family: 'Inter', system-ui, sans-serif;">
    <!-- Flat Rectangle Base ABFC -->
    <rect x="40" y="20" width="140" height="60" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Base Diagonal Line BF -->
    <line x1="40" y1="20" x2="180" y2="80" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
    
    <!-- Right Angle Square at Corner A (Bottom-Left layout variant) -->
    <path d="M 40,30 L 50,30 L 50,20" stroke="#ffffff" stroke-width="1" fill="none" />
    
    <!-- Corner Labels matching 3D base alignment -->
    <text x="28" y="24" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">A</text>
    <text x="188" y="24" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">B</text>
    <text x="28" y="92" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">F</text>
    <text x="188" y="92" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#ffffff">C</text>
    
    <!-- Length Dimensions -->
    <text x="110" y="15" font-family="Times New Roman, serif" font-size="12" fill="#ffffff" text-anchor="middle">8 cm</text>
    <text x="195" y="55" font-family="Times New Roman, serif" font-size="12" fill="#ffffff">6 cm</text>
    <text x="115" y="60" font-family="Times New Roman, serif" font-size="12" fill="#ffffff" text-anchor="middle">BF</text>
</svg>