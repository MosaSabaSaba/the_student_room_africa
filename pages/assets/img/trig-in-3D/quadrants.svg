<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" width="500" height="360" style="display: inline-block; font-family: 'Inter', system-ui, sans-serif;">
    <!-- X and Y Axes -->
    <line x1="55" y1="180" x2="430" y2="180" stroke="#ffffff" stroke-width="2" />
    <line x1="230" y1="30" x2="230" y2="330" stroke="#ffffff" stroke-width="2" />

    <!-- Axis Angle Labels -->
    <text x="440" y="184" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff">0° / 360°</text>
    <text x="230" y="22" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">90°</text>
    <text x="47" y="184" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="end">180°</text>
    <text x="230" y="346" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">270°</text>

    <!-- Quadrant I (Top Right) - ALL Positive -->
    <text x="310" y="85" font-family="Arial, sans-serif" font-weight="bold" font-size="44" fill="#00ffcc" text-anchor="middle">A</text>
    <text x="310" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">Quadrant I</text>
    <text x="310" y="138" font-family="'Times New Roman', serif" font-size="14" font-style="italic" fill="#ffffff" text-anchor="middle">All ratios +</text>
    <text x="310" y="156" font-family="'Times New Roman', serif" font-size="12" fill="#ffffff" style="opacity: 0.7;" text-anchor="middle">sin, cos, tan</text>

    <!-- Quadrant II (Top Left) - SINE Positive -->
    <text x="150" y="85" font-family="Arial, sans-serif" font-weight="bold" font-size="44" fill="#00ffcc" text-anchor="middle">S</text>
    <text x="150" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">Quadrant II</text>
    <text x="150" y="138" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">sin +</text>
    <text x="150" y="156" font-family="'Times New Roman', serif" font-size="12" fill="#ffffff" style="opacity: 0.7;" text-anchor="middle">cos −, tan −</text>

    <!-- Quadrant III (Bottom Left) - TANGENT Positive -->
    <text x="150" y="235" font-family="Arial, sans-serif" font-weight="bold" font-size="44" fill="#00ffcc" text-anchor="middle">T</text>
    <text x="150" y="265" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">Quadrant III</text>
    <text x="150" y="288" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">tan +</text>
    <text x="150" y="306" font-family="'Times New Roman', serif" font-size="12" fill="#ffffff" style="opacity: 0.7;" text-anchor="middle">sin −, cos −</text>

    <!-- Quadrant IV (Bottom Right) - COSINE Positive -->
    <text x="310" y="235" font-family="Arial, sans-serif" font-weight="bold" font-size="44" fill="#00ffcc" text-anchor="middle">C</text>
    <text x="310" y="265" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">Quadrant IV</text>
    <text x="310" y="288" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">cos +</text>
    <text x="310" y="306" font-family="'Times New Roman', serif" font-size="12" fill="#ffffff" style="opacity: 0.7;" text-anchor="middle">sin −, tan −</text>
</svg>