<svg style="font-family: 'Inter', system-ui, sans-serif;" width="250" height="80" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg">
    <style>
        .math { fill: #ffffff; font-family: 'serif', Times, serif; font-style: italic; font-size: 22px; }
        .sub { font-size: 14px; }
        .f-line { stroke: #00ffcc; stroke-width: 2; }
    </style>
    <text x="10" y="48" class="math">m =</text>
    <!-- Fraction 1 -->
    <text x="55" y="32" class="math">y<tspan dy="5" class="sub">2</tspan><tspan dy="-5"> - y</tspan><tspan dy="5" class="sub">1</tspan></text>
    <line x1="50" y1="42" x2="130" y2="42" class="f-line"/>
    <text x="55" y="68" class="math">x<tspan dy="5" class="sub">2</tspan><tspan dy="-5"> - x</tspan><tspan dy="5" class="sub">1</tspan></text>
    <!-- Equals -->
    <text x="140" y="48" class="math">=</text>
    <!-- Fraction 2 -->
    <text x="175" y="32" class="math" style="fill: #ff8888;">Rise</text>
    <line x1="170" y1="42" x2="230" y2="42" class="f-line"/>
    <text x="175" y="68" class="math" style="fill: #88ff88;">Run</text>
</svg>