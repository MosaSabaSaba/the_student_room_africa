<svg style="font-family: 'Inter', system-ui, sans-serif;" width="450" height="450" viewBox="0 0 450 450" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .grid { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .function-line { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .rise-run { stroke: #ffcc00; stroke-width: 2; stroke-dasharray: 5,5; fill: none; }
        .point { fill: #ffcc00; }
        .coord-label { fill: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
        .axis-value { fill: #aaaaaa; font-family: sans-serif; font-size: 10px; }
        .rise-label { fill: #ff8888; font-family: sans-serif; font-size: 12px; font-weight: bold; }
        .run-label { fill: #88ff88; font-family: sans-serif; font-size: 12px; font-weight: bold; }
    </style>

    <!-- Grid with 40px spacing (Origin at x=150, y=310) -->
    
    <!-- Vertical Grid Lines & X-Axis Labels -->
    <!-- x = -2 at x=70 -->
    <line x1="70" y1="20" x2="70" y2="420" class="grid"/> 
    <text x="65" y="325" class="axis-value">-2</text>
    
    <!-- x = -1 at x=110 -->
    <line x1="110" y1="20" x2="110" y2="420" class="grid"/> 
    <text x="105" y="325" class="axis-value">-1</text>
    
    <!-- Y Axis (x=0) at x=150 -->
    <line x1="150" y1="20" x2="150" y2="420" class="axis"/> 
    <text x="145" y="325" class="axis-value">0</text>
    
    <!-- x = 1 at x=190 -->
    <line x1="190" y1="20" x2="190" y2="420" class="grid"/> 
    <text x="188" y="325" class="axis-value">1</text>
    
    <!-- x = 2 at x=230 -->
    <line x1="230" y1="20" x2="230" y2="420" class="grid"/> 
    <text x="228" y="325" class="axis-value">2</text>
    
    <!-- x = 3 at x=270 -->
    <line x1="270" y1="20" x2="270" y2="420" class="grid"/> 
    <text x="268" y="325" class="axis-value">3</text>

    <!-- Horizontal Grid Lines & Y-Axis Labels -->
    <!-- y = -2 at y=390 -->
    <line x1="20" y1="390" x2="320" y2="390" class="grid"/> 
    <text x="130" y="393" class="axis-value">-2</text>
    
    <!-- y = -1 at y=350 -->
    <line x1="20" y1="350" x2="320" y2="350" class="grid"/> 
    <text x="130" y="353" class="axis-value">-1</text>
    
    <!-- X Axis (y=0) at y=310 -->
    <line x1="20" y1="310" x2="420" y2="310" class="axis"/>
    
    <!-- y = 1 at y=270 -->
    <line x1="20" y1="270" x2="320" y2="270" class="grid"/> 
    <text x="135" y="273" class="axis-value">1</text>
    
    <!-- y = 2 at y=230 -->
    <line x1="20" y1="230" x2="320" y2="230" class="grid"/> 
    <text x="135" y="233" class="axis-value">2</text>
    
    <!-- y = 3 at y=190 -->
    <line x1="20" y1="190" x2="320" y2="190" class="grid"/> 
    <text x="135" y="193" class="axis-value">3</text>
    
    <!-- y = 4 at y=150 -->
    <line x1="20" y1="150" x2="320" y2="150" class="grid"/> 
    <text x="135" y="153" class="axis-value">4</text>
    
    <!-- y = 5 at y=110 -->
    <line x1="20" y1="110" x2="320" y2="110" class="grid"/> 
    <text x="135" y="113" class="axis-value">5</text>

    <!-- Function Line y = 2x + 1 (passes through (-2,-3) to (3,7)) -->
    <line x1="70" y1="430" x2="230" y2="110" class="function-line"/>

    <!-- Rise/Run Steps between (1,3) and (2,5) -->
    <!-- (1,3) is at x=190, y=190 | (2,5) is at x=230, y=110 -->
    <path d="M 190 190 L 230 190 L 230 110" class="rise-run"/>
    <text x="235" y="155" class="rise-label">Rise: 2</text>
    <text x="195" y="205" class="run-label">Run: 1</text>

    <!-- Points and Coordinate Labels -->
    <!-- (-2, -3) at x=70, y=430 -->
    <circle cx="70" cy="430" r="5" class="point"/>
    <text x="25" y="445" class="coord-label">(-2, -3)</text>

    <!-- (-1, -1) at x=110, y=350 -->
    <circle cx="110" cy="350" r="5" class="point"/>
    <text x="65" y="365" class="coord-label">(-1, -1)</text>

    <!-- (0, 1) at x=150, y=270 -->
    <circle cx="150" cy="270" r="5" class="point" fill="#00ffcc"/>
    <text x="158" y="265" class="coord-label">(0, 1)</text>

    <!-- (1, 3) at x=190, y=190 -->
    <circle cx="190" cy="190" r="5" class="point"/>
    <text x="165" y="180" class="coord-label">(1, 3)</text>

    <!-- (2, 5) at x=230, y=110 -->
    <circle cx="230" cy="110" r="5" class="point"/>
    <text x="235" y="100" class="coord-label">(2, 5)</text>

    <!-- Axis Titles -->
    <text x="310" y="315" class="coord-label">x</text>
    <text x="155" y="20" class="coord-label">y</text>
</svg>