<svg style="font-family: 'Inter', system-ui, sans-serif;" width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .horizontal-line { stroke: #00ffcc; stroke-width: 3; }
        .vertical-line { stroke: #ffcc00; stroke-width: 3; }
        .label { fill: #ffffff; font-family: sans-serif; font-size: 12px; }
    </style>

    <!-- Axes -->
    <line x1="50" y1="180" x2="430" y2="180" class="axis"/>
    <line x1="240" y1="20" x2="240" y2="320" class="axis"/>

    <polygon points="425,180 415,175 415,185" fill="#ffffff"/>
    <polygon points="240,25 235,35 245,35" fill="#ffffff"/>

    <text x="435" y="185" fill="#ffffff" font-size="14">x</text>
    <text x="245" y="15" fill="#ffffff" font-size="14">y</text>

    <!-- Horizontal line y = 3 -->
    <line x1="50" y1="60" x2="430" y2="60" class="horizontal-line"/>
    <text x="50" y="50" fill="#00ffcc" font-size="12">y = 3</text>

    <!-- Horizontal line y = -2 -->
    <line x1="50" y1="250" x2="430" y2="250" class="horizontal-line"/>
    <text x="50" y="270" fill="#00ffcc" font-size="12">y = -2</text>

    <!-- Vertical line x = -1 -->
    <line x1="165" y1="20" x2="165" y2="320" class="vertical-line"/>
    <text x="165" y="15" fill="#ffcc00" font-size="12">x = -1</text>

    <!-- Vertical line x = 2 -->
    <line x1="370" y1="20" x2="370" y2="320" class="vertical-line"/>
    <text x="370" y="15" fill="#ffcc00" font-size="12">x = 2</text>
</svg>