<svg style="font-family: 'Inter', system-ui, sans-serif;" width="450" height="400" viewBox="0 0 450 400" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .grid { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.3; }
        .point { fill: #ffcc00; }
        .label { fill: #00ffcc; font-family: sans-serif; font-size: 12px; }
    </style>

    <!-- Axes -->
    <line x1="50" y1="200" x2="430" y2="200" class="axis"/>
    <line x1="240" y1="20" x2="240" y2="380" class="axis"/>

    <!-- Arrow heads -->
    <polygon points="425,200 415,195 415,205" fill="#ffffff"/>
    <polygon points="240,25 235,35 245,35" fill="#ffffff"/>

    <!-- Grid lines -->
    <line x1="50" y1="140" x2="430" y2="140" class="grid"/>
    <line x1="50" y1="80" x2="430" y2="80" class="grid"/>
    <line x1="50" y1="260" x2="430" y2="260" class="grid"/>
    <line x1="50" y1="320" x2="430" y2="320" class="grid"/>

    <line x1="110" y1="20" x2="110" y2="380" class="grid"/>
    <line x1="175" y1="20" x2="175" y2="380" class="grid"/>
    <line x1="305" y1="20" x2="305" y2="380" class="grid"/>
    <line x1="370" y1="20" x2="370" y2="380" class="grid"/>

    <!-- Labels -->
    <text x="435" y="205" fill="#ffffff" font-size="14">x</text>
    <text x="245" y="15" fill="#ffffff" font-size="14">y</text>
    <text x="235" y="205" fill="#00ffcc" font-size="12">0</text>

    <text x="105" y="215" fill="#00ffcc" font-size="12">-2</text>
    <text x="170" y="215" fill="#00ffcc" font-size="12">-1</text>
    <text x="310" y="215" fill="#00ffcc" font-size="12">1</text>
    <text x="375" y="215" fill="#00ffcc" font-size="12">2</text>

    <text x="245" y="145" fill="#00ffcc" font-size="12">2</text>
    <text x="245" y="85" fill="#00ffcc" font-size="12">4</text>
    <text x="245" y="265" fill="#00ffcc" font-size="12">-2</text>
    <text x="245" y="325" fill="#00ffcc" font-size="12">-4</text>

    <!-- Point (2, 3) -->
    <circle cx="370" cy="80" r="5" class="point"/>
    <text x="375" y="75" fill="#ffffff" font-size="11">(2, 4)</text>
</svg>