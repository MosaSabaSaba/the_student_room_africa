<svg style="font-family: 'Inter', system-ui, sans-serif;" width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .function-line { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .domain-line { stroke: #ffcc00; stroke-width: 2; stroke-dasharray: 5,3; }
        .range-line { stroke: #ff8888; stroke-width: 2; stroke-dasharray: 5,3; }
    </style>
    <line x1="50" y1="200" x2="320" y2="200" class="axis"/>
    <line x1="180" y1="30" x2="180" y2="230" class="axis"/>
    <path d="M 90 200 Q 135 80 180 50 Q 225 80 270 200" class="function-line" fill="none"/>
    
    <!-- Domain represented on x-axis -->
    <line x1="50" y1="210" x2="310" y2="210" class="domain-line"/>
    <text x="180" y="225" fill="#ffcc00" font-size="10" text-anchor="middle">Domain: all real numbers</text>
    
    <!-- Range represented on y-axis -->
    <line x1="40" y1="200" x2="40" y2="50" class="range-line"/>
    <text x="35" y="125" fill="#ff8888" font-size="10" text-anchor="end">Range: y ≥ 0</text>
</svg>