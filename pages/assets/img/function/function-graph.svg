<svg style="font-family: 'Inter', system-ui, sans-serif;" width="450" height="450" viewBox="0 0 450 450" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .grid { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .function-line { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .point { fill: #ffcc00; }
        .coord-label { fill: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
        .axis-value { fill: #aaaaaa; font-family: sans-serif; font-size: 10px; }
    </style>

    <!-- 40px grid spacing -->
    <!-- Origin at x=150, y=350 -->
    
    <!-- X-axis (y=0) at y=350 -->
    <line x1="30" y1="350" x2="410" y2="350" class="axis"/>
    <!-- Y-axis (x=0) at x=150 -->
    <line x1="150" y1="20" x2="150" y2="420" class="axis"/>

    <text x="415" y="355" fill="#ffffff" font-size="14">x</text>
    <text x="155" y="15" fill="#ffffff" font-size="14">y</text>

    <!-- Vertical grid lines (40px spacing) -->
    <line x1="70" y1="20" x2="70" y2="420" class="grid"/>  <!-- x = -2 -->
    <line x1="110" y1="20" x2="110" y2="420" class="grid"/> <!-- x = -1 -->
    <line x1="150" y1="20" x2="150" y2="420" class="axis"/> <!-- x = 0 -->
    <line x1="190" y1="20" x2="190" y2="420" class="grid"/> <!-- x = 1 -->
    <line x1="230" y1="20" x2="230" y2="420" class="grid"/> <!-- x = 2 -->
    <line x1="270" y1="20" x2="270" y2="420" class="grid"/> <!-- x = 3 -->

    <!-- X-axis labels -->
    <text x="65" y="370" class="axis-value">-2</text>
    <text x="105" y="370" class="axis-value">-1</text>
    <text x="145" y="370" class="axis-value">0</text>
    <text x="185" y="370" class="axis-value">1</text>
    <text x="225" y="370" class="axis-value">2</text>
    <text x="265" y="370" class="axis-value">3</text>

    <!-- Horizontal grid lines (40px spacing) -->
    <line x1="30" y1="430" x2="400" y2="430" class="grid"/> <!-- y = -2 -->
    <line x1="30" y1="390" x2="400" y2="390" class="grid"/> <!-- y = -1 -->
    <line x1="30" y1="350" x2="400" y2="350" class="axis"/> <!-- y = 0 -->
    <line x1="30" y1="310" x2="400" y2="310" class="grid"/> <!-- y = 1 -->
    <line x1="30" y1="270" x2="400" y2="270" class="grid"/> <!-- y = 2 -->
    <line x1="30" y1="230" x2="400" y2="230" class="grid"/> <!-- y = 3 -->
    <line x1="30" y1="190" x2="400" y2="190" class="grid"/> <!-- y = 4 -->
    <line x1="30" y1="150" x2="400" y2="150" class="grid"/> <!-- y = 5 -->
    <line x1="30" y1="110" x2="400" y2="110" class="grid"/> <!-- y = 6 -->
    <line x1="30" y1="70" x2="400" y2="70" class="grid"/>  <!-- y = 7 -->

    <!-- Y-axis labels (every 1 unit) -->
    <text x="130" y="434" class="axis-value">-2</text>
    <text x="130" y="394" class="axis-value">-1</text>
    <text x="130" y="354" class="axis-value">0</text>
    <text x="135" y="314" class="axis-value">1</text>
    <text x="135" y="274" class="axis-value">2</text>
    <text x="135" y="234" class="axis-value">3</text>
    <text x="135" y="194" class="axis-value">4</text>
    <text x="135" y="154" class="axis-value">5</text>
    <text x="135" y="114" class="axis-value">6</text>
    <text x="135" y="74" class="axis-value">7</text>

    <!-- Function line f(x) = 2x - 1 -->
    <!-- Points: (-2,-5) would be at y=470 (off grid), so we show from x=-1 to x=3 -->
    <!-- (-1,-3) at x=110, y=470? Wait, need to recalculate -->
    <!-- Let me recalculate: y=-3 at x=110 should be y=470 but that's off grid, so we show from x=0 to x=3 -->
    <!-- (0,-1) at x=150, y=390; (1,1) at x=190, y=310; (2,3) at x=230, y=230; (3,5) at x=270, y=150 -->
    <polyline points="150,390 190,310 230,230 270,150" class="function-line"/>

    <!-- Points with labels -->
    <circle cx="150" cy="390" r="4" class="point"/>
    <text x="155" y="385" class="coord-label">(0, -1)</text>

    <circle cx="190" cy="310" r="4" class="point"/>
    <text x="200" y="305" class="coord-label">(1, 1)</text>

    <circle cx="230" cy="230" r="4" class="point"/>
    <text x="240" y="225" class="coord-label">(2, 3)</text>

    <circle cx="270" cy="150" r="4" class="point"/>
    <text x="280" y="145" class="coord-label">(3, 5)</text>

    <!-- Note to learners -->
    <text x="200" y="440" fill="#aaaaaa" font-family="sans-serif" font-size="10" text-anchor="middle">Note: Point (-2,-5) and (-1,-3) are off the graph</text>
</svg>