<svg style="font-family: 'Inter', system-ui, sans-serif;" width="450" height="510" viewBox="0 0 450 510" xmlns="http://www.w3.org/2000/svg">
    <style>
        .axis { stroke: #ffffff; stroke-width: 2; }
        .grid { stroke: #ffffff; stroke-width: 0.5; stroke-dasharray: 3,3; opacity: 0.2; }
        .function-line { stroke: #00ffcc; stroke-width: 3; fill: none; }
        .point { fill: #ffcc00; }
        .label { fill: #ffffff; font-family: sans-serif; font-size: 11px; }
        .coord-label { fill: #00ffcc; font-family: sans-serif; font-size: 12px; font-weight: bold; }
        .axis-value { fill: #aaaaaa; font-family: sans-serif; font-size: 10px; }
    </style>

    <!-- Background grid (40px squares) -->
    <!-- Origin (0,0) is at x=150, y=350 -->
    
    <!-- Vertical Grid Lines & X-Axis Labels -->
    <line x1="70" y1="20" x2="70" y2="520" class="grid"/> <text x="65" y="365" class="axis-value">-2</text>
    <line x1="110" y1="20" x2="110" y2="520" class="grid"/> <text x="105" y="365" class="axis-value">-1</text>
    <line x1="150" y1="20" x2="150" y2="520" class="axis"/> <!-- Y Axis (x=0) -->
    <line x1="190" y1="20" x2="190" y2="520" class="grid"/> <text x="188" y="365" class="axis-value">1</text>
    <line x1="230" y1="20" x2="230" y2="520" class="grid"/> <text x="228" y="365" class="axis-value">2</text>
    <line x1="270" y1="20" x2="270" y2="520" class="grid"/> <text x="268" y="365" class="axis-value">3</text>

    <!-- Horizontal Grid Lines & Y-Axis Labels -->
    <line x1="30" y1="470" x2="320" y2="470" class="grid"/> <text x="130" y="473" class="axis-value">-3</text>
    <line x1="30" y1="430" x2="320" y2="430" class="grid"/> <text x="130" y="433" class="axis-value">-2</text>
    <line x1="30" y1="390" x2="320" y2="390" class="grid"/> <text x="130" y="393" class="axis-value">-1</text>
    <line x1="30" y1="350" x2="320" y2="350" class="axis"/> <!-- X Axis (y=0) -->
    <line x1="30" y1="310" x2="320" y2="310" class="grid"/> <text x="138" y="313" class="axis-value">1</text>
    <line x1="30" y1="270" x2="320" y2="270" class="grid"/> <text x="138" y="273" class="axis-value">2</text>
    <line x1="30" y1="230" x2="320" y2="230" class="grid"/> <text x="138" y="233" class="axis-value">3</text>
    <line x1="30" y1="190" x2="320" y2="190" class="grid"/> <text x="138" y="193" class="axis-value">4</text>
    <line x1="30" y1="150" x2="320" y2="150" class="grid"/> <text x="138" y="153" class="axis-value">5</text>
    <line x1="30" y1="110" x2="320" y2="110" class="grid"/> <text x="138" y="113" class="axis-value">6</text>
    <line x1="30" y1="70" x2="320" y2="70" class="grid"/> <text x="138" y="73" class="axis-value">7</text>

    <!-- Function Line y = 2x + 1 (only between x = -2 and x = 3) -->
    <polyline points="70,470 270,70" class="function-line"/>

    <!-- Points and Coordinate Labels -->
    <circle cx="70" cy="470" r="4" class="point"/>
    <text x="25" y="485" class="coord-label">(-2, -3)</text>

    <circle cx="110" cy="390" r="4" class="point"/>
    <text x="65" y="405" class="coord-label">(-1, -1)</text>

    <circle cx="150" cy="310" r="4" class="point"/>
    <text x="160" y="315" class="coord-label">(0, 1)</text>

    <circle cx="190" cy="230" r="4" class="point"/>
    <text x="200" y="235" class="coord-label">(1, 3)</text>

    <circle cx="230" cy="150" r="4" class="point"/>
    <text x="240" y="155" class="coord-label">(2, 5)</text>

    <circle cx="270" cy="70" r="4" class="point"/>
    <text x="280" y="75" class="coord-label">(3, 7)</text>

    <!-- Axis Titles -->
    <text x="310" y="340" class="label" font-weight="bold">x</text>
    <text x="160" y="30" class="label" font-weight="bold">y</text>
</svg>