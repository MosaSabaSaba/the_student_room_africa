<svg style="font-family: 'Inter', system-ui, sans-serif;" width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
    <!-- Style to keep lines uniform and match your aesthetic -->
    <style>
        .cube-edge { fill: none; stroke: #fff; stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
    </style>

    <!-- ==================== CUBE 1 (1x1x1) ==================== -->
    <g transform="translate(10, 50)">
        <!-- Front Face -->
        <rect x="0" y="10" width="15" height="15" class="cube-edge"/>
        <!-- Top Face -->
        <path d="M 0 10 L 8 0 L 23 0 L 15 10 Z" class="cube-edge"/>
        <!-- Right Face -->
        <path d="M 15 10 L 23 0 L 23 15 L 15 25 Z" class="cube-edge"/>
    </g>

    <!-- ==================== CUBE 2 (2x2x2) ==================== -->
    <g transform="translate(65, 50)">
        <!-- Front Grid -->
        <rect x="0" y="15" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="15" width="15" height="15" class="cube-edge"/>
        <rect x="0" y="30" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="30" width="15" height="15" class="cube-edge"/>
        <!-- Top Grid -->
        <path d="M 0 15 L 8 5 L 23 5 L 15 15 Z" class="cube-edge"/>
        <path d="M 15 15 L 23 5 L 38 5 L 30 15 Z" class="cube-edge"/>
        <path d="M 8 5 L 16 -5 L 31 -5 L 23 5 Z" class="cube-edge"/>
        <path d="M 23 5 L 31 -5 L 46 -5 L 38 5 Z" class="cube-edge"/>
        <!-- Right Grid -->
        <path d="M 30 15 L 38 5 L 38 20 L 30 30 Z" class="cube-edge"/>
        <path d="M 30 30 L 38 20 L 38 35 L 30 45 Z" class="cube-edge"/>
        <path d="M 38 5 L 46 -5 L 46 10 L 38 20 Z" class="cube-edge"/>
        <path d="M 38 20 L 46 10 L 46 25 L 38 35 Z" class="cube-edge"/>
    </g>

    <!-- ==================== CUBE 3 (3x3x3) ==================== -->
    <g transform="translate(145, 50)">
        <!-- Front Layer Grid (3x3 blocks) -->
        <rect x="0" y="20" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="20" width="15" height="15" class="cube-edge"/>
        <rect x="30" y="20" width="15" height="15" class="cube-edge"/>
        <rect x="0" y="35" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="35" width="15" height="15" class="cube-edge"/>
        <rect x="30" y="35" width="15" height="15" class="cube-edge"/>
        <rect x="0" y="50" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="50" width="15" height="15" class="cube-edge"/>
        <rect x="30" y="50" width="15" height="15" class="cube-edge"/>
        <!-- Top Outer Edges for Depth -->
        <path d="M 0 20 L 24 -10 L 69 -10 L 45 20 Z" class="cube-edge"/>
        <path d="M 15 20 L 39 -10 M 30 20 L 54 -10" class="cube-edge"/>
        <path d="M 8 10 L 53 10 M 16 0 L 61 0" class="cube-edge"/>
        <!-- Right Outer Edges for Depth -->
        <path d="M 45 20 L 69 -10 L 69 35 L 45 65 Z" class="cube-edge"/>
        <path d="M 45 35 L 69 5 M 45 50 L 69 20" class="cube-edge"/>
        <path d="M 53 10 L 53 40 M 61 0 L 61 30" class="cube-edge"/>
    </g>

