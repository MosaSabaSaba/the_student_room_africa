        <rect x="30" y="30" width="15" height="15" class="cube-edge"/>
        <rect x="45" y="30" width="15" height="15" class="cube-edge"/>
        <rect x="60" y="30" width="15" height="15" class="cube-edge"/>
        <rect x="0" y="45" width="15" height="15" class="cube-edge"/>
        <rect x="15" y="45" width="15" height="15" class="cube-edge"/>
        <rect x="30" y="45" width="15" height="15" class="cube-edge"/>
        <rect x="45" y="45" width="15" height="15" class="cube-edge"/>
        <rect x="60" y="45" width="15" height="15" class="cube-edge"/>
        <rect x="0" y="60" width="15" height="15" class="cube-edge"/>
