        <rect x="45" y="90" width="15" height="15" class="cube-edge"/>
        <rect x="60" y="90" width="15" height="15" class="cube-edge"/>
        <!-- Top Outer Edges for Depth -->
        <path d="M 0 30 L 40 -20 L 115 -20 L 75 30 Z" class="cube-edge"/>
        <path d="M 15 30 L 55 -20 M 30 30 L 70 -20 M 45 30 L 85 -20 M 60 30 L 100 -20" class="cube-edge"/>
        <path d="M 8 20 L 83 20 M 16 10 L 91 10 M 24 0 L 99 0 M 32 -10 L 107 -10" class="cube-edge"/>
