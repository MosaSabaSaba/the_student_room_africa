<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 550 180" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape { stroke: #fff; stroke-width: 2; fill: none; }
        .letter { fill: #00ffcc; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .sub-txt { fill: #00ffcc; font-family: sans-serif; font-size: 12px; }
    </style>
    <g transform="translate(30, 20)">
        <g transform="translate(0, 10)">
            <rect x="25" y="25" width="70" height="70" class="shape" />
            <text x="15" y="20" class="letter">A</text><text x="100" y="20" class="letter">B</text><text x="100" y="110" class="letter">C</text><text x="15" y="110" class="letter">D</text>
            <text x="60" y="125" class="sub-txt" text-anchor="middle">0°</text>
        </g>
        <g transform="translate(120, 10)">
            <rect x="25" y="25" width="70" height="70" class="shape" />
            <text x="100" y="20" class="letter">A</text><text x="100" y="110" class="letter">B</text><text x="15" y="110" class="letter">C</text><text x="15" y="20" class="letter">D</text>
            <text x="60" y="125" class="sub-txt" text-anchor="middle">90°</text>
        </g>
        <g transform="translate(240, 10)">
            <rect x="25" y="25" width="70" height="70" class="shape" />
            <text x="100" y="110" class="letter">A</text><text x="15" y="110" class="letter">B</text><text x="15" y="20" class="letter">C</text><text x="100" y="20" class="letter">D</text>
            <text x="60" y="125" class="sub-txt" text-anchor="middle">180°</text>
        </g>
        <g transform="translate(360, 10)">
            <rect x="25" y="25" width="70" height="70" class="shape" />
            <text x="15" y="110" class="letter">A</text><text x="15" y="20" class="letter">B</text><text x="100" y="20" class="letter">C</text><text x="100" y="110" class="letter">D</text>
            <text x="60" y="125" class="sub-txt" text-anchor="middle">270°</text>
        </g>
    </g>
</svg>