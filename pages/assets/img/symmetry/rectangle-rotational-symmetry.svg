<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 550 180" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape { stroke: #fff; stroke-width: 2; fill: none; }
        .letter { fill: #00ffcc; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .sub-txt { fill: #00ffcc; font-family: sans-serif; font-size: 12px; }
    </style>
    <g transform="translate(30, 20)">
        <g transform="translate(0, 10)">
            <rect x="15" y="35" width="100" height="60" class="shape" />
            <text x="5" y="30" class="letter">A</text><text x="120" y="30" class="letter">B</text><text x="120" y="110" class="letter">C</text><text x="5" y="110" class="letter">D</text>
            <text x="65" y="130" class="sub-txt" text-anchor="middle">0°</text>
        </g>
        <g transform="translate(180, 10)">
            <rect x="15" y="35" width="100" height="60" class="shape" />
            <text x="120" y="110" class="letter">A</text><text x="5" y="110" class="letter">B</text><text x="5" y="30" class="letter">C</text><text x="120" y="30" class="letter">D</text>
            <text x="65" y="130" class="sub-txt" text-anchor="middle">180°</text>
        </g>
    </g>
</svg>