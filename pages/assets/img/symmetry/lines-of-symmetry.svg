<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 450 1400" xmlns="http://www.w3.org/2000/svg" style="background-color: transparent;">
    <style>
        .shape { stroke: #fff; stroke-width: 2; fill: none; }
        .sym-line { stroke: #fff; stroke-width: 1.5; stroke-dasharray: 4; }
        .txt { fill: #fff; font-family: sans-serif; font-size: 16px; }
    </style>

    <!-- RECTANGLE -->
    <g transform="translate(50, 50)">
        <text x="0" y="0" class="txt">A rectangle has 2 lines of symmetry</text>
        <rect x="75" y="50" width="150" height="80" class="shape" />
        <line x1="55" y1="90" x2="245" y2="90" class="sym-line" />
        <line x1="150" y1="30" x2="150" y2="150" class="sym-line" />
    </g>

    <!-- EQUILATERAL TRIANGLE -->
    <g transform="translate(50, 300)">
        <text x="0" y="0" class="txt">An equilateral triangle has 3 lines of symmetry</text>
        <path d="M 150 40 L 236 190 L 64 190 Z" class="shape" />
        <line x1="150" y1="20" x2="150" y2="210" class="sym-line" />
        <line x1="47" y1="200" x2="201" y2="108" class="sym-line" />
        <line x1="253" y1="200" x2="99" y2="108" class="sym-line" />
    </g>

    <!-- SQUARE -->
    <g transform="translate(50, 580)">
        <text x="0" y="0" class="txt">A square has 4 lines of symmetry</text>
        <rect x="100" y="50" width="100" height="100" class="shape" />
        <line x1="80" y1="100" x2="220" y2="100" class="sym-line" />
        <line x1="150" y1="30" x2="150" y2="170" class="sym-line" />
        <line x1="85" y1="35" x2="215" y2="165" class="sym-line" />
        <line x1="215" y1="35" x2="85" y2="165" class="sym-line" />
    </g>

    <!-- PENTAGON -->
    <g transform="translate(50, 850)">
        <text x="0" y="0" class="txt">A regular pentagon has 5 lines of symmetry</text>
        <path d="M 150 50 L 226 105 L 197 195 L 103 195 L 74 105 Z" class="shape" />
        <line x1="150" y1="30" x2="150" y2="215" class="sym-line" />
        <line x1="242" y1="94" x2="72" y2="158" class="sym-line" />
        <line x1="58" y1="94" x2="228" y2="158" class="sym-line" />
        <line x1="211" y1="211" x2="98" y2="65" class="sym-line" />
        <line x1="89" y1="211" x2="202" y2="65" class="sym-line" />
    </g>

    <!-- HEXAGON -->
    <g transform="translate(50, 1150)">
        <text x="0" y="0" class="txt">A regular hexagon has 6 lines of symmetry</text>
        <path d="M 150 50 L 215 87 L 215 162 L 150 200 L 85 162 L 85 87 Z" class="shape" />
        <line x1="150" y1="30" x2="150" y2="220" class="sym-line" />
        <line x1="65" y1="125" x2="235" y2="125" class="sym-line" />
        <line x1="70" y1="78" x2="230" y2="171" class="sym-line" />
        <line x1="230" y1="78" x2="70" y2="171" class="sym-line" />
        <line x1="108" y1="53" x2="192" y2="197" class="sym-line" />
        <line x1="192" y1="53" x2="108" y2="197" class="sym-line" />
    </g>
</svg>