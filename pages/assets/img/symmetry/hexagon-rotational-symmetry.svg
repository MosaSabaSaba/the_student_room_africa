<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 550 320" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape { stroke: #fff; stroke-width: 2; fill: none; }
        .letter { fill: #00ffcc; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .sub-txt { fill: #00ffcc; font-family: sans-serif; font-size: 12px; }
    </style>
    <g transform="translate(30, 20)">
        <g transform="translate(0, 0)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" />
            <text x="55" y="15" class="letter">A</text><text x="105" y="40" class="letter">B</text><text x="105" y="90" class="letter">C</text><text x="55" y="115" class="letter">D</text><text x="5" y="90" class="letter">E</text><text x="5" y="40" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">0°</text>
        </g>
        <g transform="translate(150, 0)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" transform="rotate(60, 60, 60)" />
            <text x="105" y="40" class="letter">A</text><text x="105" y="90" class="letter">B</text><text x="55" y="115" class="letter">C</text><text x="5" y="90" class="letter">D</text><text x="5" y="40" class="letter">E</text><text x="55" y="15" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">60°</text>
        </g>
        <g transform="translate(300, 0)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" transform="rotate(120, 60, 60)" />
            <text x="105" y="90" class="letter">A</text><text x="55" y="115" class="letter">B</text><text x="5" y="90" class="letter">C</text><text x="5" y="40" class="letter">D</text><text x="55" y="15" class="letter">E</text><text x="105" y="40" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">120°</text>
        </g>
        <g transform="translate(0, 150)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" transform="rotate(180, 60, 60)" />
            <text x="55" y="115" class="letter">A</text><text x="5" y="90" class="letter">B</text><text x="5" y="40" class="letter">C</text><text x="55" y="15" class="letter">D</text><text x="105" y="40" class="letter">E</text><text x="105" y="90" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">180°</text>
        </g>
        <g transform="translate(150, 150)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" transform="rotate(240, 60, 60)" />
            <text x="5" y="90" class="letter">A</text><text x="5" y="40" class="letter">B</text><text x="55" y="15" class="letter">C</text><text x="105" y="40" class="letter">D</text><text x="105" y="90" class="letter">E</text><text x="55" y="115" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">240°</text>
        </g>
        <g transform="translate(300, 150)">
            <path d="M 60 20 L 100 40 L 100 80 L 60 100 L 20 80 L 20 40 Z" class="shape" transform="rotate(300, 60, 60)" />
            <text x="5" y="40" class="letter">A</text><text x="55" y="15" class="letter">B</text><text x="105" y="40" class="letter">C</text><text x="105" y="90" class="letter">D</text><text x="55" y="115" class="letter">E</text><text x="5" y="90" class="letter">F</text>
            <text x="60" y="130" class="sub-txt" text-anchor="middle">300°</text>
        </g>
    </g>
</svg>