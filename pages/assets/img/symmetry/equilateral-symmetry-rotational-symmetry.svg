<svg style="font-family: 'Inter', system-ui, sans-serif;" viewBox="0 0 550 200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .shape { stroke: #fff; stroke-width: 2; fill: none; }
        .letter { fill: #00ffcc; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .sub-txt { fill: #00ffcc; font-family: sans-serif; font-size: 12px; }
    </style>
    
    <g transform="translate(30, 20)">
        <g transform="translate(0, 20)">
            <path d="M 60 20 L 112 110 L 8 110 Z" class="shape" />
            <text x="55" y="15" class="letter">A</text><text x="115" y="120" class="letter">B</text><text x="0" y="120" class="letter">C</text>
            <text x="60" y="140" class="sub-txt" text-anchor="middle">0°</text>
        </g>
        <g transform="translate(160, 20)">
            <path d="M 60 20 L 112 110 L 8 110 Z" class="shape" transform="rotate(120, 60, 80)" />
            <text x="115" y="120" class="letter">A</text><text x="0" y="120" class="letter">B</text><text x="55" y="15" class="letter">C</text>
            <text x="60" y="140" class="sub-txt" text-anchor="middle">120°</text>
        </g>
        <g transform="translate(320, 20)">
            <path d="M 60 20 L 112 110 L 8 110 Z" class="shape" transform="rotate(240, 60, 80)" />
            <text x="0" y="120" class="letter">A</text><text x="55" y="15" class="letter">B</text><text x="115" y="120" class="letter">C</text>
            <text x="60" y="140" class="sub-txt" text-anchor="middle">240°</text>
        </g>
    </g>
</svg>