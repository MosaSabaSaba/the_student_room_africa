<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" width="100%" height="100%">
    <style>
        .boundary { stroke: #ffffff; stroke-width: 2; fill: none; }
        .set-circle { stroke: #ffffff; stroke-width: 1.5; fill: none; }
        .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
        .symbol-text { font-family: "Times New Roman", Times, serif; font-size: 20px; font-weight: bold; fill: #ffffff; font-style: italic; }
    </style>

    <!-- Universal Set Symbol (Curly/Universal Epsilon/Xi style) -->
    <text x="10" y="25" class="symbol-text">&#958;</text>

    <!-- Universal Set Boundary Rectangle -->
    <rect x="30" y="15" width="170" height="95" class="boundary" />

    <!-- Left Circle -->
    <circle cx="85" cy="62" r="30" class="set-circle" />

    <!-- Right Circle -->
    <circle cx="125" cy="62" r="30" class="set-circle" />

    <!-- Elements / Numbers -->
    <text x="42" y="98" class="label-text">7</text>
    <text x="135" y="67" class="label-text">15</text>
</svg>