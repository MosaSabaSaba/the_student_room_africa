<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://w3.org" viewBox="0 0 260 110" width="100%" height="100%">
    <defs>
        <!-- Mask to subtract the left ellipse (P) from the right ellipse (Q) -->
        <mask id="subtract-P">
            <!-- Everything white stays visible -->
            <rect x="0" y="0" width="260" height="110" fill="#ffffff" />
            <!-- Everything black becomes transparent (cuts out P) -->
            <ellipse cx="95" cy="55" rx="45" ry="25" fill="#000000" />
        </mask>
    </defs>

    <style>
        .boundary { stroke: #ffffff; stroke-width: 1.5; fill: none; }
        .set-ellipse { stroke: #ffffff; stroke-width: 1.5; fill: none; }
        .shaded-region { fill: #ffffff; fill-opacity: 0.25; }
        .label-text { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #ffffff; }
        .symbol-text { font-family: "Times New Roman", Times, serif; font-size: 18px; font-weight: bold; fill: #ffffff; font-style: italic; }
    </style>

    <!-- Universal Set Symbol (Using safe decimal numeric character reference) -->
    <text x="10" y="25" class="symbol-text">&#958;</text>

    <!-- Universal Set Boundary Rectangle -->
    <rect x="25" y="15" width="220" height="80" class="boundary" />

    <!-- Shaded Area (Q only) using the mask -->
    <ellipse cx="155" cy="55" rx="45" ry="25" class="shaded-region" mask="url(#subtract-P)" />

    <!-- Left Ellipse (P) Outline -->
    <ellipse cx="95" cy="55" rx="45" ry="25" class="set-ellipse" />

    <!-- Right Ellipse (Q) Outline -->
    <ellipse cx="155" cy="55" rx="45" ry="25" class="set-ellipse" />

    <!-- Labels for Sets P and Q -->
    <text x="88" y="26" class="label-text">P</text>
    <text x="160" y="26" class="label-text">Q</text>
</svg>
